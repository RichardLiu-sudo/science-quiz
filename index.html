  {"id": 85, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态瓶里的小鱼增多，耗氧量______，小鱼浮到水面的次数会增多。如果小鱼增加两倍或四倍，那么小鱼浮到水面的次 数会越来越多，甚至会因缺氧而死亡。", "answer": "增大"},
  {"id": 86, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态瓶里的小鱼增多，耗氧量增大，小鱼浮到水面的______。如果小鱼增加两倍或四倍，那么小鱼浮到水面的次 数会越来越多，甚至会因缺氧而死亡。", "answer": "次数会增多"},
  {"id": 87, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态瓶里的小鱼增多，耗氧量增大，小鱼浮到水面的次数会增多。如果小鱼增加两倍或四倍，那么小鱼浮到水面的次 ______，甚至会因缺氧而死亡。", "answer": "数会越来越多"},
  {"id": 88, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态瓶里的小鱼增多，耗氧量增大，小鱼浮到水面的次数会增多。如果小鱼增加两倍或四倍，那么小鱼浮到水面的次 数会越来越多，甚至会______。", "answer": "因缺氧而死亡"},
  {"id": 89, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态瓶里的植物不是越多越好，多到一定程度，既影响______，又会减小动物的活动空间，对生态系统也会 产生不良影响。", "answer": "植物对光的吸收"},
  {"id": 90, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态瓶里的植物不是越多越好，多到一定程度，既影响植物对光的吸收，又会______，对生态系统也会 产生不良影响。", "answer": "减小动物的活动空间"},
  {"id": 91, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态瓶里的植物不是越多越好，多到一定程度，既影响植物对光的吸收，又会减小动物的活动空间，对生态系统也会 产生______。", "answer": "不良影响"},
  {"id": 92, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "______指同一时间生活在一定自然区域内，同种生物的所有个体【比如一群大象】", "answer": "种群"},
  {"id": 93, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "种群指同一时间生活在一定自然区域内，______【比如一群大象】", "answer": "同种生物的所有个体"},
  {"id": 94, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "______指相同时间聚集在同一区域或环境内各种生物种群的集合【比如绿豆苗+周围的蚜虫、瓢虫、蜘蛛等生物】", "answer": "群落"},
  {"id": 95, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "群落指相同时间聚集在同一区域或环境内______种群的集合【比如绿豆苗+周围的蚜虫、瓢虫、蜘蛛等生物】", "answer": "各种生物"},
  {"id": 96, "unit": "第二单元 船的研究", "lesson": "第 1 课 船的历史", "question": "船的发展历程：______。", "answer": "独木舟-摇橹木船-帆船-蒸汽船-轮船-潜艇"},
  {"id": 97, "unit": "第二单元 船的研究", "lesson": "第 1 课 船的历史", "question": "独木舟存在______，不稳定等缺点。我们可以采用增宽船体等方法使其保持稳定。", "answer": "装载量小"},
  {"id": 98, "unit": "第二单元 船的研究", "lesson": "第 1 课 船的历史", "question": "独木舟存在装载量小，______等缺点。我们可以采用增宽船体等方法使其保持稳定。", "answer": "不稳定"},
  {"id": 99, "unit": "第二单元 船的研究", "lesson": "第 1 课 船的历史", "question": "独木舟存在装载量小，不稳定等缺点。我们可以采用______等方法使其保持稳定。", "answer": "增宽船体"},
  {"id": 100, "unit": "第二单元 船的研究", "lesson": "第 1 课 船的历史", "question": "船在水中行驶时，会受到______。船首采用流线型（尖形），可以减小船在行驶中的阻力。", "answer": "水的阻力"},
  {"id": 101, "unit": "第二单元 船的研究", "lesson": "第 1 课 船的历史", "question": "船在水中行驶时，会受到水的阻力。船首采用______，可以减小船在行驶中的阻力。", "answer": "流线型（尖形）"},
  {"id": 102, "unit": "第二单元 船的研究", "lesson": "第 1 课 船的历史", "question": "船在水中行驶时，会受到水的阻力。船首采用流线型（尖形），可以______船在行驶中的阻力。", "answer": "减小"},
  {"id": 103, "unit": "第二单元 船的研究", "lesson": "第 1 课 船的历史", "question": "随着船的不断发展，______ 力】、功能方面都发生了变化", "answer": "船的材料【木制-钢铁】、构造、载重量【小-大】、安全系数、动力【人工-风力-蒸汽-内燃机-电"},
  {"id": 104, "unit": "第二单元 船的研究", "lesson": "第 1 课 船的历史", "question": "随着船的不断发展，船的材料【木制-钢铁】、构造、载重量【小-大】、安全系数、动力【人工-风力-蒸汽-内燃机-电 ______方面都发生了变化", "answer": "力】、功能"},
  {"id": 105, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "用螺母测试船的载重量，注意______螺母。为了防止侧翻，应将螺母均匀地摆放。", "answer": "不能让水浸湿"},
  {"id": 106, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "用螺母测试船的载重量，注意不能让水浸湿螺母。为了防止侧翻，应将螺母______地摆放。", "answer": "均匀"},
  {"id": 107, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "竹筏通过______，增加底面积，比独木舟更稳定、载重量更大。", "answer": "加大船体"},
  {"id": 108, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "竹筏通过加大船体，______，比独木舟更稳定、载重量更大。", "answer": "增加底面积"},
  {"id": 109, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "竹筏的不足之处：______。", "answer": "容易浸水、不牢固、载重量有限"},
  {"id": 110, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "改进方法：用______、优化船体的尺度和线型，把船的体积做得更大、给船安装“橹”或“帆”。", "answer": "防水材料造船"},
  {"id": 111, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "改进方法：用防水材料造船、优化船体的尺度和线型，把船的______、给船安装“橹”或“帆”。", "answer": "体积做得更大"},
  {"id": 112, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "改进方法：用防水材料造船、优化船体的尺度和线型，把船的体积做得更大、给船______。", "answer": "安装“橹”或“帆”"},
  {"id": 113, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "摇橹木船和明代宝船______的问题，而且出现了“摇橹”“风帆”等动力系统。", "answer": "解决了容易浸水"},
  {"id": 114, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "摇橹木船和明代宝船解决了容易浸水的问题，而且出现了______等动力系统。", "answer": "“摇橹”“风帆”"},
  {"id": 115, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "浮的材料，比如______可以制作船。", "answer": "竹子、木头"},
  {"id": 116, "unit": "第二单元 船的研究", "lesson": "第 3 课 用沉的材料造船", "question": "有的材料在水中是浮的，有的材料在水中是沉的。沉的材料，比如______可以制作船。", "answer": "橡皮、铝箔纸、钢铁"},
  {"id": 117, "unit": "第二单元 船的研究", "lesson": "第 3 课 用沉的材料造船", "question": "物体在水中会受到______托起的力，像这样的力是浮力。", "answer": "竖直向上"},
  {"id": 118, "unit": "第二单元 船的研究", "lesson": "第 3 课 用沉的材料造船", "question": "物体在水中会受到竖直向上托起的力，像这样的力是______。", "answer": "浮力"},
  {"id": 119, "unit": "第二单元 船的研究", "lesson": "第 3 课 用沉的材料造船", "question": "相同质量的橡皮泥和铝箔纸，把它们做成船型后，浸入水中的______，在水中受到的浮力增大，越容易浮在水面。", "answer": "体积增大"},
  {"id": 120, "unit": "第二单元 船的研究", "lesson": "第 3 课 用沉的材料造船", "question": "相同质量的橡皮泥和铝箔纸，把它们做成船型后，浸入水中的体积增大，在水中受到的______，越容易浮在水面。", "answer": "浮力增大"},
  {"id": 121, "unit": "第二单元 船的研究", "lesson": "第 3 课 用沉的材料造船", "question": "渡船的底部特别宽阔，可以提高船的______。双体船是一种带有两个平行船体的船，这样做的优点是提高船的稳定性。", "answer": "稳定性"},
  {"id": 122, "unit": "第二单元 船的研究", "lesson": "第 3 课 用沉的材料造船", "question": "渡船的底部特别宽阔，可以______。双体船是一种带有两个平行船体的船，这样做的优点是提高船的稳定性。", "answer": "提高船的稳定性"},
  {"id": 123, "unit": "第二单元 船的研究", "lesson": "第 3 课 用沉的材料造船", "question": "工程设计的过程：______。", "answer": "问题-设计-制作-测试-完善"},
  {"id": 124, "unit": "第二单元 船的研究", "lesson": "第 4 课 增加船的载重量", "question": "船的载重量与______有关， 相同重量和相同大小的材料， 制作的船型体积越大， 船的载重量就越大。", "answer": "船只的体积"},
  {"id": 125, "unit": "第二单元 船的研究", "lesson": "第 4 课 增加船的载重量", "question": "船的载重量与船只的体积有关， ______和相同大小的材料， 制作的船型体积越大， 船的载重量就越大。", "answer": "相同重量"},
  {"id": 126, "unit": "第二单元 船的研究", "lesson": "第 4 课 增加船的载重量", "question": "船的载重量与船只的体积有关， 相同重量和______的材料， 制作的船型体积越大， 船的载重量就越大。", "answer": "相同大小"},
  {"id": 127, "unit": "第二单元 船的研究", "lesson": "第 4 课 增加船的载重量", "question": "船的载重量与船只的体积有关， 相同重量和相同大小的材料， 制作的船型体积______， 船的载重量就越大。", "answer": "越大"},
  {"id": 128, "unit": "第二单元 船的研究", "lesson": "第 4 课 增加船的载重量", "question": "船的载重量与船只的体积有关， 相同重量和相同大小的材料， 制作的船型体积______， 船的载重量就越大。", "answer": "越大"},
  {"id": 129, "unit": "第二单元 船的研究", "lesson": "第 4 课 增加船的载重量", "question": "船舱中______有利于增加船的载重量。弹珠滚动容易导致船侧翻， 为了均匀放置货物，可以船舱分格来增加船的稳定性。", "answer": "合理放置重物"},
  {"id": 130, "unit": "第二单元 船的研究", "lesson": "第 4 课 增加船的载重量", "question": "船舱中合理放置重物有利于增加船的载重量。弹珠滚动容易导致船侧翻， 为了均匀放置货物，可以______来增加船的稳定性。", "answer": "船舱分格"},
  {"id": 131, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "船可以通过______来控制方向。", "answer": "船舵"},
  {"id": 132, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "船可以通过船舵来______。", "answer": "控制方向"},
  {"id": 133, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "可以利用______等作为船的动力。", "answer": "风力、蒸汽动力、机械动力"},
  {"id": 134, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "船身设计成为______可以减少水的阻力。", "answer": "流线型"},
  {"id": 135, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "潜艇常用的动力有______和核动力。", "answer": "柴油动力"},
  {"id": 136, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "潜艇常用的动力有柴油动力和______。", "answer": "核动力"},
  {"id": 137, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "可以通过______改变潜水艇的重力：进水，重力增加，潜水艇下沉；排水，重力减小，潜水艇上浮。", "answer": "进水、排水"},
  {"id": 138, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "可以通过进水、排水改变潜水艇的______：进水，重力增加，潜水艇下沉；排水，重力减小，潜水艇上浮。", "answer": "重力"},
  {"id": 139, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "可以通过______、排水改变潜水艇的重力：进水，重力增加，潜水艇下沉；排水，重力减小，潜水艇上浮。", "answer": "进水"},
  {"id": 140, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "可以通过进水、排水改变潜水艇的重力：进水，重力增加，潜水艇______；排水，重力减小，潜水艇上浮。", "answer": "下沉"},
  {"id": 141, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "可以通过进水、______改变潜水艇的重力：进水，重力增加，潜水艇下沉；排水，重力减小，潜水艇上浮。", "answer": "排水"},
  {"id": 142, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "可以通过进水、排水改变潜水艇的重力：进水，重力增加，潜水艇下沉；排水，重力减小，潜水艇______。", "answer": "上浮"},
  {"id": 143, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "设计我们的小船时需要考虑的因素：______。", "answer": "船的大小、船的形状、船体材料、载重量、稳固性、动力系统、材料成本"},
  {"id": 144, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "制作时要按照______进行，工程设计一般会经历“问题－设计－制作－测试－评估改进”等过程。", "answer": "设计图"},
  {"id": 145, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "制作时要按照设计图进行，工程设计一般会经历“______”等过程。", "answer": "问题－设计－制作－测试－评估改进"},

  {"id": 252, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "凝结现象：洗澡后镜子出现水雾、做饭时锅盖上的水珠、饮料从冰箱拿出后表面出现水珠等。 4.水蒸气肉眼看不见，所以水沸腾时看到的“白气 ”不是水蒸气，而是______。", "answer": "水蒸气凝结的小水滴"},

  {"id": 254, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "盐可以加速冰的融化，加速降温，烧杯______变多【装有冰的烧杯外壁有水珠是因为空气中的水蒸气遇冷的烧杯", "answer": "外壁的水珠"},
  {"id": 255, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "盐可以加速冰的融化，加速降温，烧杯外壁的水珠变多【装有冰的烧杯外壁有水珠是因为______的烧杯", "answer": "空气中的水蒸气遇冷"},
  {"id": 256, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "自然界中水的形态多种多样，常见的有______等，他们的形成都与水蒸气的凝结有关。", "answer": "云、雾、雨、露、霜、雪"},

  {"id": 258, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "云：水蒸气在高空中______或凝华成小冰晶便形成了云。", "answer": "遇冷凝结成小水珠"},

  {"id": 260, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "雾：水蒸气______并附着在空气中的浮尘上便形成了雾。", "answer": "遇冷凝结成小水珠"},

  {"id": 262, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "霜：地面附近的水蒸气遇到冷的物体(温度在 0℃以下)，______,便形成了霜。", "answer": "凝华成固态的小冰晶"},
  {"id": 263, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "雪：水蒸气在空中______,小冰晶汇聚到一起形成雪降落下来。", "answer": "遇冷凝华成小冰晶"},
  {"id": 264, "unit": "第四单元 热", "lesson": "第 3 课 温度不同的物体相互接触", "question": "刚从冰箱里取出的牛奶，要使它变成热的，我们会把它浸在热水中。热会从热水转移到牛奶。 实验结论：______", "answer": "热通常从温度高的物体传向温度低的物体。"},
  {"id": 265, "unit": "第四单元 热", "lesson": "第 3 课 温度不同的物体相互接触", "question": "热水跟冷水接触，最终二者温度相同，然后跟空气进行热量传递，一起______。 实验结论：两个温度不同的物体相互接触，最终温度相同，达到热平衡。", "answer": "下降到室温"},
  {"id": 266, "unit": "第四单元 热", "lesson": "第 3 课 温度不同的物体相互接触", "question": "热水跟冷水接触，最终二者______，然后跟空气进行热量传递，一起下降到室温。 实验结论：两个温度不同的物体相互接触，最终温度相同，达到热平衡。", "answer": "温度相同"},
  {"id": 267, "unit": "第四单元 热", "lesson": "第 3 课 温度不同的物体相互接触", "question": "热水跟冷水接触，最终二者温度相同，然后跟空气进行热量传递，一起下降到室温。 实验结论：两个温度不同的物体相互接触，最终温度相同，达到______。", "answer": "热平衡"},
  {"id": 268, "unit": "第四单元 热", "lesson": "第 3 课 温度不同的物体相互接触", "question": "在实验中，我们测量物体的温度通常使用______，生活中还有更多可以感知温度的方法，比如使用热成像仪、感温纸 带、感温粉末。", "answer": "温度计"},

  {"id": 270, "unit": "第四单元 热", "lesson": "第 3 课 温度不同的物体相互接触", "question": "在实验中，我们测量物体的温度通常使用温度计，生活中还有更多可以感知温度的方法，比如使用热成像仪、感温纸 ______", "answer": "带、感温粉末。"},
  {"id": 271, "unit": "第四单元 热", "lesson": "第 4 课 热在金属中的传递", "question": "热传递有一定的方向性，热总是______，或从一个高温物体传递给一个低温物体。热 传递的方向与物体的体积、质量等无关。", "answer": "从温度较高的一端传向温度较低的一端"},
  {"id": 272, "unit": "第四单元 热", "lesson": "第 4 课 热在金属中的传递", "question": "热传递有一定的方向性，热总是从温度较高的一端传向温度较低的一端，或从一个高温物体传递给一个低温物体。热 ______", "answer": "传递的方向与物体的体积、质量等无关。"},
  {"id": 273, "unit": "第四单元 热", "lesson": "第 4 课 热在金属中的传递", "question": "热传递有______三种传递方式。", "answer": "热传导、热对流、热辐射"},
  {"id": 274, "unit": "第四单元 热", "lesson": "第 4 课 热在金属中的传递", "question": "(1)热传导：通过______，是固体热传递的主要方式。 (2)热对流：靠气体和液体的流动来传热的方式。", "answer": "直接接触传热"},

// ==================== STATE ====================
let currentMode = "choice"; // "choice" | "fill"
let currentUnit = null;
let currentQuestions = [];
let answeredCount = 0;
let correctCount = 0;
let timerOn = false;
let timerSeconds = 0;
let timerInterval = null;
let quizFinished = false;
let wrongMap = {};
let masteredSet = {};
let choiceIndex = 0;
let fillIndex = 0;

function loadWrongMap() {
  try {
    const raw = localStorage.getItem(getStorageKey() + "_wrongMap");
    if (raw) wrongMap = JSON.parse(raw);
  } catch(e) { wrongMap = {}; }
}

function saveWrongMap() {
  localStorage.setItem(getStorageKey() + "_wrongMap", JSON.stringify(wrongMap));
}

function loadMasteredSet() {
  try {
    const raw = localStorage.getItem(getStorageKey() + "_mastered");
    if (raw) masteredSet = JSON.parse(raw);
    else masteredSet = {};
  } catch(e) { masteredSet = {}; }
}

function saveMasteredSet() {
  localStorage.setItem(getStorageKey() + "_mastered", JSON.stringify(masteredSet));
}

function getCurrentIndex() {
  return currentMode === "choice" ? choiceIndex : fillIndex;
}
function setCurrentIndex(val) {
  if (currentMode === "choice") choiceIndex = val;
  else fillIndex = val;
}
function getVisibleQs() {
  return currentQuestions.filter(q => !masteredSet[q.id]);
}
function findNextUnansweredIdx(startIdx) {
  const visibleQs = getVisibleQs();
  for (let i = startIdx + 1; i < visibleQs.length; i++) {
    if (!visibleQs[i]._answered) return i;
  }
  return -1;
}

function updateWrongStat() {
  const count = Object.keys(wrongMap).length;
  document.getElementById("stat-wrong").textContent = "错题: " + count;
  const btn = document.getElementById("btn-wrong-practice");
  if (btn) btn.style.display = count > 0 ? "" : "none";
}

function getStorageKey() {
  return currentMode === "choice" ? "science_quiz_choice_v4" : "science_quiz_fill_v4";
}

function getData() {
  return currentMode === "choice" ? CHOICE_DATA : FILL_DATA;
}

function getActiveClass() {
  return currentMode === "choice" ? "choice-active-unit" : "fill-active-unit";
}

function getToolbarActiveClass() {
  return currentMode === "choice" ? "choice-toolbar-active" : "fill-toolbar-active";
}

// ==================== MODE SWITCH ====================
function switchMode(mode) {
  if (currentMode === mode) return;
  stopTimer();
  currentMode = mode;
  setCurrentIndex(0);

  // Update tabs
  document.getElementById("tab-choice").className = mode === "choice" ? "mode-tab choice-active" : "mode-tab";
  document.getElementById("tab-fill").className = mode === "fill" ? "mode-tab fill-active" : "mode-tab";

  // Update progress bar color
  document.getElementById("progress-fill").className = mode === "choice" ? "progress-fill choice-progress" : "progress-fill fill-progress";

  // Reset state
  currentUnit = null;
  currentQuestions = [];
  answeredCount = 0;
  correctCount = 0;
  timerOn = false;
  quizFinished = false;

  document.getElementById("btn-timer").className = "";
  document.getElementById("timer-display").style.display = "none";
  document.getElementById("result-panel").style.display = "none";
  document.getElementById("wrong-book-area").style.display = "none";
  document.getElementById("records-area").style.display = "none";
  document.getElementById("timer-display").textContent = "00:00";
  document.getElementById("correct-count-display").textContent = "已答对: 0";

  document.getElementById("stat-total").textContent = "当前: " + getData().length + " 题";
  document.getElementById("stat-mastered").textContent = "已掌握: 0";
  document.getElementById("stat-wrong").textContent = "错题: 0";

  loadWrongMap();
  loadMasteredSet();
  updateWrongStat();

  renderUnitSelector();
  startQuiz(null);
}

// ==================== INIT ====================
function renderUnitSelector() {
  const data = getData();
  const seen = new Set();
  const units = [];
  for (const q of data) {
    if (!seen.has(q.unit)) {
      seen.add(q.unit);
      units.push(q.unit);
    }
  }

  const activeCls = getActiveClass();
  const homeText = currentMode === "choice" ? "全部单元混合测试" : "全部填空题";
  const container = document.getElementById("unit-selector");

  let html = `<button class="unit-btn ${activeCls}" onclick="startQuiz(null)" data-unit="">${homeText}</button>`;
  for (const u of units) {
    const count = data.filter(q => q.unit === u).length;
    html += `<button class="unit-btn" onclick="startQuiz('${u.replace(/'/g, "\\'")}')" data-unit="${u.replace(/"/g, '&quot;')}">${u} (${count}题)</button>`;
  }
  container.innerHTML = html;
}

function startQuiz(unit) {
  stopTimer();
  currentUnit = unit;
  quizFinished = false;
  answeredCount = 0;
  correctCount = 0;
  timerSeconds = 0;
  timerOn = false;
  setCurrentIndex(0);

  document.getElementById("btn-timer").className = "";
  document.getElementById("timer-display").style.display = "none";
  document.getElementById("timer-display").textContent = "00:00";
  document.getElementById("result-panel").style.display = "none";
  document.getElementById("wrong-book-area").style.display = "none";
  document.getElementById("records-area").style.display = "none";
  document.getElementById("correct-count-display").textContent = "已答对: 0";

  const data = getData();
  const activeCls = getActiveClass();

  // Update unit buttons
  document.querySelectorAll(".unit-btn").forEach(btn => {
    btn.className = "unit-btn";
    if ((unit === null && btn.dataset.unit === "") || btn.dataset.unit === unit) {
      btn.classList.add(activeCls);
    }
  });

  loadMasteredSet();

  if (unit) {
    currentQuestions = data.filter(q => q.unit === unit && !masteredSet[q.id]).map(q => ({...q, _answered: false, _correct: null, _userAnswer: null}));
  } else {
    currentQuestions = data.filter(q => !masteredSet[q.id]).map(q => ({...q, _answered: false, _correct: null, _userAnswer: null}));
  }

  document.getElementById("stat-total").textContent = "当前: " + currentQuestions.length + " 题";
  document.getElementById("stat-mastered").textContent = "已掌握: " + Object.keys(masteredSet).length;

  loadWrongMap();
  updateWrongStat();

  renderQuiz();
  updateProgress();
}

function startWrongQuiz() {
  loadWrongMap();
  loadMasteredSet();
  const wrongIds = Object.keys(wrongMap).filter(id => !masteredSet[Number(id)]).map(Number);
  if (wrongIds.length === 0) {
    alert("暂无错题");
    return;
  }

  stopTimer();
  currentUnit = null;
  quizFinished = false;
  answeredCount = 0;
  correctCount = 0;
  timerSeconds = 0;
  timerOn = false;
  setCurrentIndex(0);

  document.getElementById("btn-timer").className = "";
  document.getElementById("timer-display").style.display = "none";
  document.getElementById("timer-display").textContent = "00:00";
  document.getElementById("result-panel").style.display = "none";
  document.getElementById("wrong-book-area").style.display = "none";
  document.getElementById("records-area").style.display = "none";

  const data = getData();
  const activeCls = getActiveClass();

  // Clear unit button highlights
  document.querySelectorAll(".unit-btn").forEach(btn => {
    btn.className = "unit-btn";
  });

  currentQuestions = data.filter(q => wrongIds.includes(q.id)).map(q => ({...q, _answered: false, _correct: null, _userAnswer: null}));

  document.getElementById("stat-total").textContent = "当前: " + currentQuestions.length + " 题 (错题练习)";
  document.getElementById("stat-mastered").textContent = "已掌握: " + Object.keys(masteredSet).length;

  renderQuiz();
  updateProgress();
}

function shuffleQuestions() {
  if (quizFinished) return;
  for (let i = currentQuestions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [currentQuestions[i], currentQuestions[j]] = [currentQuestions[j], currentQuestions[i]];
  }
  setCurrentIndex(0);
  renderQuiz();
}

function toggleTimer() {
  timerOn = !timerOn;
  const btn = document.getElementById("btn-timer");
  if (timerOn) {
    btn.classList.add(getToolbarActiveClass());
    document.getElementById("timer-display").style.display = "";
    startTimer();
  } else {
    btn.className = "";
    document.getElementById("timer-display").style.display = "none";
    stopTimer();
  }
}

function startTimer() {
  timerSeconds = 0;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSeconds++;
    updateTimerDisplay();
  }, 1000);
}

function stopTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60).toString().padStart(2, "0");
  const s = (timerSeconds % 60).toString().padStart(2, "0");
  document.getElementById("timer-display").textContent = m + ":" + s;
}

function updateProgress() {
  const total = currentQuestions.length;
  if (total === 0) {
    document.getElementById("progress-fill").style.width = "0%";
    return;
  }
  const pct = Math.round(answeredCount / total * 100);
  document.getElementById("progress-fill").style.width = pct + "%";
}

function updateStats() {
  document.getElementById("stat-mastered").textContent = "已掌握: " + Object.keys(masteredSet).length;
  document.getElementById("correct-count-display").textContent = "已答对: " + correctCount;
}

// ==================== CHOICE MODE ====================
function renderQuiz() {
  if (currentMode === "choice") {
    renderChoiceQuiz();
  } else {
    renderFillQuiz();
  }
}

function renderNavButtons() {
  const visibleQs = getVisibleQs();
  const idx = getCurrentIndex();
  const cls = getToolbarActiveClass();
  return '<div style="display:flex;justify-content:center;gap:12px;margin-top:16px">' +
    '<button class="btn btn-outline" onclick="goToPrevQuestion()"' + (idx <= 0 ? ' disabled' : '') + '>&#9664; 上一题</button>' +
    '<button class="btn btn-outline" onclick="goToNextQuestion()"' + (idx >= visibleQs.length - 1 ? ' disabled' : '') + '>下一题 &#9654;</button>' +
    '</div>';
}

function goToPrevQuestion() {
  const idx = getCurrentIndex();
  if (idx > 0) {
    setCurrentIndex(idx - 1);
    renderQuiz();
  }
}

function goToNextQuestion() {
  const visibleQs = getVisibleQs();
  const idx = getCurrentIndex();
  if (idx < visibleQs.length - 1) {
    setCurrentIndex(idx + 1);
    renderQuiz();
  }
}

function renderChoiceQuiz() {
  const area = document.getElementById("quiz-area");
  const visibleQs = getVisibleQs();

  if (visibleQs.length === 0) {
    if (currentQuestions.every(q => q._correct === true)) {
      area.innerHTML = '<div class="empty-state"><div style="font-size:48px;margin-bottom:12px;">&#127942;</div><p>全部答对！太棒了！</p></div>';
    } else {
      area.innerHTML = '<div class="empty-state"><p>暂无题目</p></div>';
    }
    return;
  }

  // Clamp index
  if (choiceIndex >= visibleQs.length) choiceIndex = visibleQs.length - 1;
  if (choiceIndex < 0) choiceIndex = 0;

  const q = visibleQs[choiceIndex];
  let html = '<div style="text-align:center;margin-bottom:8px;color:#888;font-size:13px">第 ' + (choiceIndex + 1) + ' / ' + visibleQs.length + ' 题</div>';
  html += renderChoiceCard(q);
  html += renderNavButtons();
  area.innerHTML = html;
}

function renderChoiceCard(q) {
  let cardClass = "quiz-card";
  if (q._correct === true) cardClass += " correct";
  else if (q._correct === false) cardClass += " wrong";

  let html = `<div class="${cardClass}" id="card-${q.id}">
    <div class="quiz-meta">
      <span>${q.unit} · ${q.lesson}</span>
      <span>#${q.id}</span>
    </div>
    <div class="quiz-question">${q.question}</div>`;

  if (q._answered) {
    html += '<div class="options-list">';
    for (let i = 0; i < q.options.length; i++) {
      const letter = String.fromCharCode(65 + i);
      let cls = "option-item disabled";
      if (letter === q.answer) cls += " correct-answer";
      else if (letter === q._userAnswer && q._correct === false) cls += " wrong-answer";
      html += `<div class="${cls}"><span class="option-letter">${letter}</span>${q.options[i].substring(2).trim()}</div>`;
    }
    html += '</div>';
    html += `<div class="explanation show">${q.explanation}</div>`;
  } else {
    html += '<div class="options-list">';
    for (let i = 0; i < q.options.length; i++) {
      const letter = String.fromCharCode(65 + i);
      html += `<div class="option-item" onclick="selectChoiceAnswer(${q.id}, '${letter}')"><span class="option-letter">${letter}</span>${q.options[i].substring(2).trim()}</div>`;
    }
    html += '</div>';
    html += '<div class="explanation" id="exp-' + q.id + '"></div>';
  }

  html += '</div>';
  return html;
}

function selectChoiceAnswer(id, userAnswer) {
  if (quizFinished) return;
  const q = currentQuestions.find(q => q.id === id);
  if (!q || q._answered) return;

  q._answered = true;
  q._userAnswer = userAnswer;
  q._correct = (userAnswer === q.answer);

  answeredCount++;
  if (q._correct) {
    correctCount++;
    masteredSet[q.id] = true;
    saveMasteredSet();
    delete wrongMap[q.id];
  } else {
    wrongMap[q.id] = (wrongMap[q.id] || 0) + 1;
  }
  saveWrongMap();
  updateWrongStat();

  updateStats();
  updateProgress();

  // Auto-advance to next unanswered
  const visibleQs = getVisibleQs();
  const currentIdx = getCurrentIndex();
  const nextUnanswered = findNextUnansweredIdx(currentIdx);
  if (nextUnanswered >= 0) {
    setCurrentIndex(nextUnanswered);
  }
  renderQuiz();
  checkFinish();
}

// ==================== FILL MODE ====================
function renderFillQuiz() {
  const area = document.getElementById("quiz-area");
  const visibleQs = getVisibleQs();

  if (visibleQs.length === 0) {
    if (currentQuestions.every(q => q._correct === true)) {
      area.innerHTML = '<div class="empty-state"><div style="font-size:48px;margin-bottom:12px;">&#127942;</div><p>全部答对！太棒了！</p></div>';
    } else {
      area.innerHTML = '<div class="empty-state"><p>暂无题目</p></div>';
    }
    return;
  }

  // Clamp index
  if (fillIndex >= visibleQs.length) fillIndex = visibleQs.length - 1;
  if (fillIndex < 0) fillIndex = 0;

  const q = visibleQs[fillIndex];
  let html = '<div style="text-align:center;margin-bottom:8px;color:#888;font-size:13px">第 ' + (fillIndex + 1) + ' / ' + visibleQs.length + ' 题</div>';
  html += renderFillCard(q);
  html += renderNavButtons();
  area.innerHTML = html;

  // Focus input if unanswered
  if (!q._answered) {
    const input = area.querySelector(".fill-input:not([disabled])");
    if (input) input.focus();
  }
}

function renderFillCard(q) {
  let cardClass = "quiz-card";
  if (q._correct === true) cardClass += " correct";
  else if (q._correct === false) cardClass += " wrong";

  // Highlight blanks
  const questionHtml = q.question.replace(/______/g, '<span class="blank">______</span>');

  let html = `<div class="${cardClass}" id="fill-card-${q.id}">
    <div class="quiz-meta">
      <span>${q.unit} · ${q.lesson}</span>
      <span>#${q.id}</span>
    </div>
    <div class="quiz-question">${questionHtml}</div>`;

  if (q._answered) {
    // Show result
    html += `<div class="fill-input-row">
      <input type="text" class="fill-input ${q._correct ? 'correct-input' : 'wrong-input'}" value="${(q._userAnswer || '').replace(/"/g, '&quot;')}" disabled>
      <button class="fill-submit-btn" disabled>提交</button>
    </div>
    <div class="fill-answer-display show">
      ${q._correct
        ? '<span class="correct-ans">&#9989; 回答正确</span>'
        : '<span class="wrong-ans">&#10060; 回答错误，正确答案：</span><span class="correct-ans">' + q.answer.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</span>'
      }
    </div>`;
  } else {
    html += `<div class="fill-input-row">
      <input type="text" class="fill-input" id="fill-input-${q.id}" placeholder="请输入答案" onkeydown="if(event.key==='Enter')submitFillAnswer(${q.id})">
      <button class="fill-submit-btn" onclick="submitFillAnswer(${q.id})">提交</button>
    </div>
    <div class="fill-answer-display" id="fill-result-${q.id}"></div>`;
  }

  html += '</div>';
  return html;
}

function submitFillAnswer(id) {
  if (quizFinished) return;

  const q = currentQuestions.find(q => q.id === id);
  if (!q || q._answered) return;

  const input = document.getElementById("fill-input-" + id);
  if (!input) return;
  const userAnswer = input.value.trim();
  if (!userAnswer) return;

  // Fuzzy match
  const correct = fuzzyMatch(userAnswer, q.answer);

  q._answered = true;
  q._userAnswer = userAnswer;
  q._correct = correct;

  answeredCount++;
  if (correct) {
    correctCount++;
    masteredSet[q.id] = true;
    saveMasteredSet();
    delete wrongMap[q.id];
  } else {
    wrongMap[q.id] = (wrongMap[q.id] || 0) + 1;
  }
  saveWrongMap();
  updateWrongStat();

  updateStats();
  updateProgress();

  // Auto-advance to next unanswered
  const visibleQs = getVisibleQs();
  const currentIdx = getCurrentIndex();
  const nextUnanswered = findNextUnansweredIdx(currentIdx);
  if (nextUnanswered >= 0) {
    setCurrentIndex(nextUnanswered);
  }
  renderQuiz();
  checkFinish();
}

function fuzzyMatch(user, correct) {
  // Normalize: remove spaces, punctuation
  const normalize = s => s.replace(/[\s\p{P}\p{S}]/gu, "").toLowerCase();
  const uNorm = normalize(user);
  const cNorm = normalize(correct);

  if (uNorm === cNorm) return true;

  // Short answer (<=5 chars normalized): exact
  if (cNorm.length <= 5) return uNorm === cNorm;

  // Long answer: contains check (both directions)
  if (uNorm.includes(cNorm) || cNorm.includes(uNorm)) return true;

  return false;
}

// ==================== COMMON ====================
function checkFinish() {
  const unanswered = currentQuestions.filter(q => !q._answered && q._correct !== true);
  if (unanswered.length === 0) {
    finishQuiz();
  }
}

function finishQuiz() {
  quizFinished = true;
  stopTimer();

  const total = currentQuestions.length;
  const score = correctCount;

  const now = new Date();
  const dateStr = `${now.getFullYear()}年${(now.getMonth()+1).toString().padStart(2,'0')}月${now.getDate().toString().padStart(2,'0')}日 ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;

  const pct = total > 0 ? Math.round(score / total * 100) : 0;
  let grade = "";
  if (pct >= 90) grade = "优秀 &#127942;";
  else if (pct >= 75) grade = "良好 &#127775;";
  else if (pct >= 60) grade = "及格";
  else grade = "继续加油 &#128170;";

  let timerStr = "";
  if (timerOn) {
    const m = Math.floor(timerSeconds / 60);
    const s = timerSeconds % 60;
    timerStr = `<p>用时: ${m} 分 ${s} 秒</p>`;
  }

  const wrongQs = currentQuestions.filter(q => q._correct === false);
  const homeText = currentMode === "choice" ? "全部单元混合测试" : "全部填空题";

  document.getElementById("result-panel").innerHTML = `
    <div class="result-panel">
      <h2>${currentMode === "choice" ? "选择题" : "填空题"}测试完成！</h2>
      <div class="score">${pct} 分</div>
      <p style="font-size:20px;margin:8px 0">${grade}</p>
      <div class="stats">
        <p>总题数: ${total} | 正确: ${score} | 错误: ${total - score}</p>
        ${timerStr}
        <p style="font-size:12px;color:#999;margin-top:4px">${dateStr}</p>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="startQuiz(currentUnit)">重新测试</button>
        <button class="btn ${currentMode === 'choice' ? 'btn-outline' : 'btn-fill'}" onclick="startQuiz(null)">${homeText}</button>
      </div>
    </div>
  `;
  document.getElementById("result-panel").style.display = "block";
  document.getElementById("result-panel").scrollIntoView({ behavior: "smooth" });
}


// ==================== MASTERED ====================
function showMastered() {
  loadMasteredSet();
  const data = getData();
  const ids = Object.keys(masteredSet).map(Number);
  const modeLabel = currentMode === "choice" ? "选择题" : "填空题";

  document.getElementById("quiz-area").innerHTML = "";
  document.getElementById("result-panel").style.display = "none";
  document.getElementById("wrong-book-area").style.display = "none";

  const area = document.getElementById("records-area");
  if (ids.length === 0) {
    area.innerHTML = '<div class="empty-state"><div style="font-size:48px;margin-bottom:12px;">&#127942;</div><p>' + modeLabel + '暂无已掌握题目</p></div>';
  } else {
    const masteredQs = data.filter(q => ids.includes(q.id));
    // Group by unit
    const grouped = {};
    for (const q of masteredQs) {
      if (!grouped[q.unit]) grouped[q.unit] = [];
      grouped[q.unit].push(q);
    }
    const sortedUnits = Object.keys(grouped).sort();

    let html = '<h3 style="margin-bottom:12px">' + modeLabel + '已掌握 (' + ids.length + ' 题)</h3>';
    html += '<button class="btn btn-danger" onclick="clearMastered()" style="margin-bottom:16px">清空已掌握</button>';

    for (const unit of sortedUnits) {
      const qs = grouped[unit];
      html += '<h4 style="margin:20px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--primary);color:var(--primary)">' + unit + ' (' + qs.length + ' 题)</h4>';
      for (const q of qs) {
        html += '<div class="quiz-card" style="margin-bottom:12px">';
        html += '<div class="quiz-meta"><span>' + q.lesson + '</span><span>#' + q.id + '</span></div>';
        html += '<div class="quiz-question">' + q.question + '</div>';
        html += '<div class="explanation show"><strong>正确答案：</strong>' + q.answer + '</div>';
        if (currentMode === "choice" && q.explanation) {
          html += '<div class="explanation show"><strong>解析：</strong>' + q.explanation + '</div>';
        }
        html += '</div>';
      }
    }
    area.innerHTML = html;
  }
  area.style.display = "block";
  area.scrollIntoView({ behavior: "smooth" });
}

function clearMastered() {
  const modeLabel = currentMode === "choice" ? "选择题" : "填空题";
  if (confirm("确定要清空「" + modeLabel + "」所有已掌握题目吗？清空后这些题目将重新出现在测试中。此操作不可撤销。")) {
    masteredSet = {};
    saveMasteredSet();
    document.getElementById("stat-mastered").textContent = "已掌握: 0";
    document.getElementById("records-area").style.display = "none";
    document.getElementById("records-area").innerHTML = "";
  }
}

// ==================== START ====================
document.getElementById("stat-total").textContent = "当前: " + CHOICE_DATA.length + " 题";
loadWrongMap();
loadMasteredSet();
updateWrongStat();
renderUnitSelector();
startQuiz(null);
</script>
