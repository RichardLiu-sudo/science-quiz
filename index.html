        removeCorrect: s.removeCorrect || false,
        timerOn: s.timerOn || false
      };
    }
  } catch(e) {}
  return { answers: {}, wrongs: [], records: [], removeCorrect: false, timerOn: false };
}

let state = loadState();

function saveState() {
  localStorage.setItem(getLSKey(), JSON.stringify(state));
}

function getAnsweredQuestions() {
  return new Set(Object.keys(state.answers));
}

// ==================== MODE SWITCHING ====================
function switchMode(mode) {
  if (currentMode === mode) return;
  stopTimer();
  timerSeconds = 0;
  updateTimerDisplay();

  currentMode = mode;
  currentFilter = '全部';
  currentShuffled = null;
  state = loadState();

  // Update mode buttons
  const btnChoice = document.getElementById('btn-choice-mode');
  const btnFill = document.getElementById('btn-fill-mode');
  btnChoice.className = 'mode-btn' + (mode === 'choice' ? ' active' : '');
  btnFill.className = 'mode-btn' + (mode === 'fill' ? ' fill-active' : '');

  // Hide panels
  hideResult();
  hideWrongBook();
  hideRecords();

  buildUnitSelector();
  updateToolbarButtons();
  refreshQuiz();
  updateStats();

  // Resume timer if was on
  if (state.timerOn) startTimer();
}

// ==================== UNIT / QUESTIONS ====================

function getAllQuestions() {
  const data = getActiveQuestions();
  return data.map((q, i) => ({
    ...q,
    _key: currentMode === 'choice'
      ? (q.unit + '|||' + q.question)
      : ('fill_' + q.id)
  }));
}

let allQuestionsCache = [];

function refreshAllQuestionsCache() {
  allQuestionsCache = getAllQuestions();
}

function getUnits() {
  refreshAllQuestionsCache();
  const units = new Set(allQuestionsCache.map(q => q.unit));
  return ['全部', ...units];
}

function buildUnitSelector() {
  refreshAllQuestionsCache();
  const units = getUnits();
  const container = document.getElementById('unit-selector');
  container.innerHTML = units.map(u => {
    const cls = (u === currentFilter) ? 'unit-btn active' : 'unit-btn';
    const label = u === '全部' ? (currentMode === 'choice' ? '全部单元混合测试' : '全部填空题') : u;
    return `<button class="${cls}" onclick="selectUnit('${u.replace(/'/g, "\'")}')">${label}</button>`;
  }).join('');
}

function selectUnit(unit) {
  currentFilter = unit;
  currentShuffled = null;
  buildUnitSelector();
  refreshQuiz();
  hideResult();
  hideWrongBook();
  hideRecords();
  updateToolbarButtons();
}

function getUnitQuestions(unit) {
  const all = allQuestionsCache;
  if (unit === '全部') return [...all];
  return all.filter(q => q.unit === unit);
}

function refreshQuiz() {
  refreshAllQuestionsCache();
  let questions = getUnitQuestions(currentFilter);

  if (state.removeCorrect) {
    questions = questions.filter(q => !state.answers[q._key] || !isAnswerCorrect(q, state.answers[q._key]));
  }

  if (currentShuffled) {
    const orderMap = new Map(currentShuffled.map((q, i) => [q._key, i]));
    questions.sort((a, b) => (orderMap.get(a._key) || 999) - (orderMap.get(b._key) || 999));
    questions = questions.filter(q => orderMap.has(q._key));
  }

  currentQuestions = questions;
  if (currentMode === 'choice') renderChoiceQuiz();
  else renderFillQuiz();
  updateProgress();
}

// ==================== RENDER - CHOICE MODE ====================
function renderChoiceQuiz() {
  const area = document.getElementById('quiz-area');
  const answered = getAnsweredQuestions();

  if (currentQuestions.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="icon">🎉</div><p>全部题目已完成！</p><button class="btn btn-primary" onclick="resetCurrent()">重新开始</button></div>`;
    document.getElementById('progress-fill').style.width = '100%';
    return;
  }

  area.innerHTML = currentQuestions.map(q => {
    const userAnswer = state.answers[q._key];
    const isAnswered = userAnswer !== undefined;
    let cardClass = 'quiz-card';
    if (isAnswered) {
      cardClass += (userAnswer === q.answer) ? ' correct' : ' wrong';
    }

    let optionsHTML = q.options.map(opt => {
      const letter = opt.charAt(0);
      let optClass = 'option-item';
      if (isAnswered) optClass += ' disabled';
      if (isAnswered && letter === userAnswer) optClass += (userAnswer === q.answer) ? ' correct-answer' : ' wrong-answer';
      if (isAnswered && letter === q.answer && userAnswer !== q.answer) optClass += ' correct-answer';
      return `<div class="${optClass}" onclick="answerQuestion('${q._key.replace(/'/g, "\'")}', '${letter}')">
        <span class="option-letter">${letter}</span>${opt.substring(2).trim()}
      </div>`;
    }).join('');

    const explClass = isAnswered ? 'explanation show' : 'explanation';

    return `<div class="${cardClass}" id="card-${q._key.replace(/[^a-zA-Z0-9]/g, '_')}">
      <div class="quiz-meta">
        <span>${q.lesson || ''}</span><span>第${q.id}题</span>
      </div>
      <div class="quiz-question">${q.id}. ${q.question}</div>
      <div class="options-list">${optionsHTML}</div>
      <div class="${explClass}">💡 ${q.explanation}</div>
    </div>`;
  }).join('');
}

// ==================== RENDER - FILL MODE ====================
function renderFillQuiz() {
  const area = document.getElementById('quiz-area');
  const answered = getAnsweredQuestions();

  if (currentQuestions.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="icon">🎉</div><p>全部填空题已完成！</p><button class="btn btn-primary" onclick="resetCurrent()">重新开始</button></div>`;
    document.getElementById('progress-fill').style.width = '100%';
    return;
  }

  area.innerHTML = currentQuestions.map(q => {
    const userAnswer = state.answers[q._key];
    const isAnswered = userAnswer !== undefined;
    let cardClass = 'quiz-card';
    if (isAnswered) {
      const correct = isAnswerCorrect(q, userAnswer);
      cardClass += correct ? ' correct' : ' wrong';
    }

    const disabledAttr = isAnswered ? ' disabled' : '';
    const inputClass = isAnswered
      ? (isAnswerCorrect(q, userAnswer) ? ' correct-input' : ' wrong-input')
      : '';

    const answerDisplayClass = isAnswered ? 'fill-answer-display show' : 'fill-answer-display';
    const isCorrect = isAnswered && isAnswerCorrect(q, userAnswer);

    let answerDisplayHTML = '';
    if (isAnswered) {
      if (isCorrect) {
        answerDisplayHTML = `<div class="${answerDisplayClass}"><span class="correct-ans">✅ 正确！答案：${q.answer}</span></div>`;
      } else {
        answerDisplayHTML = `<div class="${answerDisplayClass}"><span class="wrong-ans">❌ 你的答案：${userAnswer}</span><br><span class="correct-ans">正确答案：${q.answer}</span></div>`;
      }
    }

    return `<div class="${cardClass}" id="card-${q._key.replace(/[^a-zA-Z0-9]/g, '_')}">
      <div class="quiz-meta">
        <span>${q.lesson || ''}</span><span>第${q.id}题</span>
      </div>
      <div class="quiz-question">${q.id}. ${q.question}</div>
      <div class="fill-input-row">
        <input type="text" class="fill-input ${inputClass}" id="input-${q._key.replace(/[^a-zA-Z0-9]/g, '_')}"
          placeholder="请输入答案..." ${disabledAttr}
          onkeydown="if(event.key==='Enter') submitFill('${q._key.replace(/'/g, "\'")}')">
        <button class="fill-submit-btn" id="btn-${q._key.replace(/[^a-zA-Z0-9]/g, '_')}"
          ${disabledAttr} onclick="submitFill('${q._key.replace(/'/g, "\'")}')">提交</button>
      </div>
      ${answerDisplayHTML}
    </div>`;
  }).join('');
}

// ==================== FUZZY MATCHING ====================
function normalizeAnswer(text) {
  // Remove all whitespace, punctuation marks commonly used in Chinese
  return text.replace(/[\s，,。.、；;：:！!？?（）()【】《》""'']/g, '').trim().toLowerCase();
}

function isAnswerCorrect(question, userAnswer) {
  if (currentMode === 'choice') {
    return userAnswer === question.answer;
  }
  // Fill mode: fuzzy matching
  const normUser = normalizeAnswer(userAnswer || '');
  const normAnswer = normalizeAnswer(question.answer);

  // Exact match after normalization
  if (normUser === normAnswer) return true;

  // If answer is short (<= 5 chars), require exact normalized match
  if (normAnswer.length <= 5) return false;

  // For longer answers, check if user answer contains the key phrase or vice versa
  // and the length difference isn't too large
  if (normUser.length >= Math.floor(normAnswer.length * 0.6) &&
      normUser.length <= Math.ceil(normAnswer.length * 1.5)) {
    if (normAnswer.includes(normUser) || normUser.includes(normAnswer)) return true;
  }

  return false;
}

function submitFill(key) {
  if (state.answers[key] !== undefined) return;

  const inputId = 'input-' + key.replace(/[^a-zA-Z0-9]/g, '_');
  const input = document.getElementById(inputId);
  if (!input) return;

  const userAnswer = input.value.trim();
  if (!userAnswer) return;

  const q = allQuestionsCache.find(q => q._key === key);
  if (!q) return;

  state.answers[key] = userAnswer;
  const isCorrect = isAnswerCorrect(q, userAnswer);

  // Record wrong
  if (!isCorrect) {
    const existing = state.wrongs.find(w => w._key === key);
    if (!existing) {
      state.wrongs.push({
        _key: key,
        id: q.id,
        unit: q.unit,
        lesson: q.lesson,
        question: q.question,
        answer: q.answer,
        userAnswer: userAnswer,
        date: new Date().toISOString()
      });
    } else {
      existing.userAnswer = userAnswer;
      existing.date = new Date().toISOString();
    }
  }

  saveState();

  // Refresh this card
  const cardId = 'card-' + key.replace(/[^a-zA-Z0-9]/g, '_');
  const card = document.getElementById(cardId);
  if (card) {
    card.classList.add(isCorrect ? 'correct' : 'wrong');
    input.disabled = true;
    input.classList.add(isCorrect ? 'correct-input' : 'wrong-input');
    const btn = document.getElementById('btn-' + key.replace(/[^a-zA-Z0-9]/g, '_'));
    if (btn) btn.disabled = true;

    // Show answer
    const answerDiv = card.querySelector('.fill-answer-display');
    if (answerDiv) {
      answerDiv.classList.add('show');
      if (isCorrect) {
        answerDiv.innerHTML = '<span class="correct-ans">✅ 正确！答案：' + q.answer + '</span>';
      } else {
        answerDiv.innerHTML = '<span class="wrong-ans">❌ 你的答案：' + userAnswer + '</span><br><span class="correct-ans">正确答案：' + q.answer + '</span>';
      }
    }
  }

  updateProgress();

  if (isCorrect && state.removeCorrect) {
    setTimeout(refreshQuiz, 600);
  }

  checkCompletion();
}

// ==================== CHOICE ANSWER ====================
function answerQuestion(key, letter) {
  if (state.answers[key] !== undefined) return;

  const q = allQuestionsCache.find(q => q._key === key);
  if (!q) return;

  state.answers[key] = letter;
  const isCorrect = (letter === q.answer);

  if (!isCorrect) {
    const existing = state.wrongs.find(w => w._key === key);
    if (!existing) {
      state.wrongs.push({
        _key: key,
        id: q.id,
        unit: q.unit,
        lesson: q.lesson,
        question: q.question,
        options: q.options,
        answer: q.answer,
        explanation: q.explanation,
        userAnswer: letter,
        date: new Date().toISOString()
      });
    } else {
      existing.userAnswer = letter;
      existing.date = new Date().toISOString();
    }
  }

  saveState();

  const cardId = 'card-' + key.replace(/[^a-zA-Z0-9]/g, '_');
  const card = document.getElementById(cardId);
  if (card) {
    const options = card.querySelectorAll('.option-item');
    options.forEach(opt => {
      opt.classList.add('disabled');
      const optLetter = opt.querySelector('.option-letter').textContent;
      if (optLetter === letter) {
        opt.classList.add(isCorrect ? 'correct-answer' : 'wrong-answer');
      }
      if (optLetter === q.answer && !isCorrect) {
        opt.classList.add('correct-answer');
      }
    });
    card.classList.add(isCorrect ? 'correct' : 'wrong');
    const expl = card.querySelector('.explanation');
    if (expl) expl.classList.add('show');
  }

  updateProgress();

  if (isCorrect && state.removeCorrect) {
    setTimeout(refreshQuiz, 600);
  }

  checkCompletion();
}

// ==================== PROGRESS & STATS ====================
function updateProgress() {
  refreshAllQuestionsCache();
  const total = getUnitQuestions(currentFilter).length;
  const answered = getAnsweredQuestions();
  let unitAnswered = 0;
  for (const q of getUnitQuestions(currentFilter)) {
    if (answered.has(q._key)) unitAnswered++;
  }
  const pct = total > 0 ? Math.round(unitAnswered / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  updateStats();
}

function updateStats() {
  refreshAllQuestionsCache();
  const all = allQuestionsCache;
  const answered = getAnsweredQuestions();
  let correct = 0;
  for (const q of all) {
    const ua = state.answers[q._key];
    if (ua !== undefined && isAnswerCorrect(q, ua)) correct++;
  }
  document.getElementById('stat-total').textContent = '总题数: ' + all.length;
  document.getElementById('stat-correct').textContent = '正确: ' + correct;
  const acc = answered.size > 0 ? Math.round(correct / answered.size * 100) + '%' : '-';
  document.getElementById('stat-accuracy').textContent = '正确率: ' + acc;
}

function checkCompletion() {
  const questions = getUnitQuestions(currentFilter);
  const answered = getAnsweredQuestions();
  const allDone = questions.every(q => answered.has(q._key));
  if (allDone && questions.length > 0) {
    showResult();
  }
}

function showResult() {
  const questions = getUnitQuestions(currentFilter);
  const answered = getAnsweredQuestions();
  let correct = 0;
  let wrong = 0;
  for (const q of questions) {
    const ua = state.answers[q._key];
    if (ua === undefined) continue;
    if (isAnswerCorrect(q, ua)) correct++;
    else wrong++;
  }
  const totalAnswered = correct + wrong;
  const score = totalAnswered > 0 ? Math.round(correct / totalAnswered * 100) : 0;

  state.records.push({
    unit: currentFilter,
    mode: currentMode,
    total: totalAnswered,
    correct: correct,
    wrong: wrong,
    score: score,
    date: new Date().toISOString()
  });
  saveState();

  const modeLabel = currentMode === 'choice' ? '选择题' : '填空题';
  const unitLabel = currentFilter === '全部' ? (currentMode === 'choice' ? '全部单元' : '全部填空题') : currentFilter;

  const panel = document.getElementById('result-panel');
  panel.style.display = 'block';
  panel.innerHTML = `
    <div class="result-panel">
      <h2>${unitLabel} - ${modeLabel}测试完成！</h2>
      <div class="score">${score}分</div>
      <div class="stats">正确 ${correct} 题 / 错误 ${wrong} 题 / 共 ${totalAnswered} 题</div>
      <button class="btn btn-primary" onclick="resetCurrent()">重新测试本单元</button>
      <button class="btn btn-outline" style="margin-left:8px" onclick="showWrongBook()">查看错题本</button>
    </div>
  `;
  document.getElementById('quiz-area').innerHTML = '';
  document.getElementById('progress-fill').style.width = '100%';
}

function hideResult() {
  document.getElementById('result-panel').style.display = 'none';
}

function resetCurrent() {
  const questions = getUnitQuestions(currentFilter);
  for (const q of questions) {
    delete state.answers[q._key];
  }
  saveState();
  currentShuffled = null;
  hideResult();
  hideWrongBook();
  hideRecords();
  refreshQuiz();
  stopTimer();
  timerSeconds = 0;
  updateTimerDisplay();
  if (state.timerOn) startTimer();
}

// ==================== SHUFFLE ====================
function shuffleQuestions() {
  let questions = getUnitQuestions(currentFilter);
  if (state.removeCorrect) {
    questions = questions.filter(q => !state.answers[q._key] || !isAnswerCorrect(q, state.answers[q._key]));
  }
  currentShuffled = [...questions].sort(() => Math.random() - 0.5);
  currentQuestions = [...currentShuffled];
  if (currentMode === 'choice') renderChoiceQuiz();
  else renderFillQuiz();
}

// ==================== REMOVE CORRECT ====================
function toggleRemoveCorrect() {
  state.removeCorrect = !state.removeCorrect;
  saveState();
  updateToolbarButtons();
  refreshQuiz();
}

// ==================== TIMER ====================
function toggleTimer() {
  state.timerOn = !state.timerOn;
  saveState();
  if (state.timerOn) {
    startTimer();
  } else {
    stopTimer();
  }
  updateToolbarButtons();
}

function startTimer() {
  stopTimer();
  document.getElementById('timer-display').style.display = 'inline';
  timerInterval = setInterval(() => {
    timerSeconds++;
    updateTimerDisplay();
  }, 1000);
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('timer-display').style.display = 'none';
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  document.getElementById('timer-display').textContent =
    String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

// ==================== WRONG BOOK ====================
function showWrongBook() {
  hideResult();
  hideRecords();
  const area = document.getElementById('wrong-book-area');

  if (state.wrongs.length === 0) {
    area.style.display = 'block';
    area.innerHTML = `<div class="empty-state"><div class="icon">📖</div><p>错题本为空，继续加油！</p></div>`;
    return;
  }

  area.style.display = 'block';
  area.innerHTML = `<h3 style="margin-bottom:12px">错题本（${state.wrongs.length} 题）</h3>
    <button class="btn btn-danger" style="margin-bottom:12px" onclick="clearWrongBook()">清空错题本</button>
    ${state.wrongs.map((w, i) => `
    <div class="wrong-item">
      <div class="quiz-meta"><span>${w.lesson || ''}</span><span>${w.unit}</span></div>
      <div class="question">${i+1}. ${w.question}</div>
      <div class="answer-info">
        <div>你的答案：<span style="color:var(--danger);font-weight:600">${w.userAnswer}</span></div>
        <div>正确答案：<span style="color:var(--success);font-weight:600">${w.answer}</span></div>
        ${w.explanation ? '<div style="margin-top:4px">💡 ' + w.explanation + '</div>' : ''}
      </div>
    </div>`).join('')}`;

  document.getElementById('quiz-area').innerHTML = '';
}

function hideWrongBook() {
  document.getElementById('wrong-book-area').style.display = 'none';
}

function clearWrongBook() {
  if (confirm('确定要清空错题本吗？')) {
    state.wrongs = [];
    saveState();
    showWrongBook();
  }
}

// ==================== RECORDS ====================
function showRecords() {
  hideResult();
  hideWrongBook();
  const area = document.getElementById('records-area');

  if (state.records.length === 0) {
    area.style.display = 'block';
    area.innerHTML = `<div class="empty-state"><div class="icon">📊</div><p>暂无学习记录</p></div>`;
    return;
  }

  area.style.display = 'block';
  area.innerHTML = `<h3 style="margin-bottom:12px">学习记录</h3>
    <button class="btn btn-danger" style="margin-bottom:12px" onclick="clearRecords()">清空记录</button>
    <div style="overflow-x:auto">
    <table class="record-table">
      <thead><tr><th>序号</th><th>模式</th><th>单元</th><th>总题数</th><th>正确</th><th>错误</th><th>得分</th><th>日期</th></tr></thead>
      <tbody>${state.records.map((r, i) => {
        const d = new Date(r.date);
        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        return `<tr>
          <td>${i+1}</td>
          <td>${r.mode === 'fill' ? '填空题' : '选择题'}</td>
          <td>${r.unit === '全部' ? (r.mode === 'fill' ? '全部填空题' : '全部混合') : r.unit}</td>
          <td>${r.total}</td>
          <td style="color:var(--success)">${r.correct}</td>
          <td style="color:var(--danger)">${r.wrong}</td>
          <td style="font-weight:600">${r.score}</td>
          <td>${dateStr}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;

  document.getElementById('quiz-area').innerHTML = '';
}

function hideRecords() {
  document.getElementById('records-area').style.display = 'none';
}

function clearRecords() {
  if (confirm('确定要清空所有学习记录吗？')) {
    state.records = [];
    saveState();
    showRecords();
  }
}

// ==================== TOOLBAR ====================
function updateToolbarButtons() {
  const btnRemove = document.getElementById('btn-remove-correct');
  const btnTimer = document.getElementById('btn-timer');

  if (state.removeCorrect) {
    btnRemove.classList.add('active');
    btnRemove.textContent = '答对排除 ✓';
  } else {
    btnRemove.classList.remove('active');
    btnRemove.textContent = '答对排除';
  }

  if (state.timerOn) {
    btnTimer.classList.add('active');
    btnTimer.textContent = '计时器 ✓';
  } else {
    btnTimer.classList.remove('active');
    btnTimer.textContent = '计时器';
  }
}

// ==================== INIT ====================
function init() {
  currentMode = 'choice';
  state = loadState();
  refreshAllQuestionsCache();
  buildUnitSelector();
  updateToolbarButtons();
  refreshQuiz();
  updateStats();

  if (state.timerOn) {
    startTimer();
  }
}

init();
</script>
