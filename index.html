<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五年级科学测试题库</title>
<style>
:root {
  --bg: #f5f6fa;
  --card-bg: #ffffff;
  --text: #2d3436;
  --text-secondary: #636e72;
  --primary: #0984e3;
  --primary-light: #dfe6e9;
  --success: #00b894;
  --danger: #d63031;
  --warning: #fdcb6e;
  --fill-accent: #6c5ce7;
  --border: #dfe6e9;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Header */
.header {
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}

.header h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
}

.header-stats {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--text-secondary);
  flex-wrap: wrap;
}

.header-stats span {
  background: var(--primary-light);
  padding: 4px 12px;
  border-radius: 20px;
  white-space: nowrap;
}

/* Mode Switch */
.mode-switch {
  display: flex;
  gap: 0;
  margin-bottom: 20px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 2px solid var(--border);
}

.mode-btn {
  flex: 1;
  padding: 12px 24px;
  border: none;
  background: var(--card-bg);
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  transition: all 0.2s;
  color: var(--text-secondary);
}

.mode-btn:first-child { border-right: 1px solid var(--border); }

.mode-btn:hover { background: var(--primary-light); }

.mode-btn.active {
  background: var(--primary);
  color: #fff;
}

.mode-btn.fill-active {
  background: var(--fill-accent);
  color: #fff;
}

/* Main */
.main {
  max-width: 900px;
  margin: 0 auto;
  padding: 24px 16px;
}

/* Unit Selector */
.unit-selector {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}

.unit-btn {
  padding: 10px 18px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card-bg);
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
  color: var(--text);
}

.unit-btn:hover { border-color: var(--primary); color: var(--primary); }
.unit-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* Toolbar */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 20px;
  align-items: center;
}

.toolbar button {
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card-bg);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
  color: var(--text);
}

.toolbar button:hover { background: var(--primary-light); }
.toolbar button.active { background: var(--primary); color: #fff; border-color: var(--primary); }

.timer-display {
  font-size: 15px;
  font-weight: 600;
  margin-left: auto;
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
  font-family: "SF Mono", "Menlo", monospace;
}

/* Progress */
.progress-bar {
  height: 6px;
  background: var(--primary-light);
  border-radius: 3px;
  margin-bottom: 20px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--success);
  border-radius: 3px;
  transition: width 0.3s ease;
}

/* Quiz card */
.quiz-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
  transition: all 0.3s;
}

.quiz-card.correct { border-left: 4px solid var(--success); }
.quiz-card.wrong { border-left: 4px solid var(--danger); }

.quiz-meta {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

.quiz-question {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  line-height: 1.6;
}

.options-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.option-item {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
  font-size: 14px;
  user-select: none;
}

.option-item:hover:not(.disabled) { border-color: var(--primary); background: #f0f7ff; }
.option-item.selected { border-color: var(--primary); background: #e8f4fd; }
.option-item.correct-answer { border-color: var(--success); background: #e6fff2; }
.option-item.wrong-answer { border-color: var(--danger); background: #ffe8e8; }
.option-item.disabled { pointer-events: none; opacity: 0.7; }

.option-letter {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: var(--primary-light);
  font-weight: 700;
  margin-right: 12px;
  font-size: 13px;
  flex-shrink: 0;
}

.correct-answer .option-letter { background: var(--success); color: #fff; }
.wrong-answer .option-letter { background: var(--danger); color: #fff; }

.explanation {
  margin-top: 12px;
  padding: 12px 16px;
  background: #fff9e6;
  border-radius: var(--radius-sm);
  font-size: 13px;
  line-height: 1.6;
  color: #856404;
  display: none;
  border: 1px solid #ffeeba;
}

.explanation.show { display: block; }

/* Fill-in-the-blank specific */
.fill-input-row {
  display: flex;
  gap: 10px;
  align-items: center;
}

.fill-input {
  flex: 1;
  padding: 10px 14px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
  font-family: inherit;
}

.fill-input:focus { border-color: var(--fill-accent); }
.fill-input:disabled { background: #f5f5f5; color: #888; }
.fill-input.correct-input { border-color: var(--success); background: #e6fff2; }
.fill-input.wrong-input { border-color: var(--danger); background: #ffe8e8; }

.fill-submit-btn {
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--fill-accent);
  color: #fff;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: opacity 0.2s;
  white-space: nowrap;
}

.fill-submit-btn:hover { opacity: 0.9; }
.fill-submit-btn:disabled { opacity: 0.5; cursor: default; }

.fill-answer-display {
  margin-top: 10px;
  font-size: 14px;
  display: none;
}

.fill-answer-display.show { display: block; }

.fill-answer-display .correct-ans {
  color: var(--success);
  font-weight: 600;
}

.fill-answer-display .wrong-ans {
  color: var(--danger);
}

/* Result Panel */
.result-panel {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 32px;
  box-shadow: var(--shadow);
  text-align: center;
  margin-bottom: 16px;
}

.result-panel h2 { font-size: 24px; margin-bottom: 16px; }
.result-panel .score { font-size: 48px; font-weight: 800; color: var(--primary); }
.result-panel .stats { color: var(--text-secondary); margin: 8px 0 20px; }

/* Wrong book */
.wrong-book { margin-top: 20px; }

.wrong-item {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
}

.wrong-item .question { font-weight: 600; margin-bottom: 8px; }
.wrong-item .answer-info { font-size: 13px; color: var(--text-secondary); }

/* Learning Record */
.record-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 16px;
  font-size: 13px;
}

.record-table th, .record-table td {
  padding: 10px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

.record-table th { background: var(--primary-light); font-weight: 600; }
.record-table tr:hover { background: #f8f9fa; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}

.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

/* Buttons */
.btn {
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
}

.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
.btn-outline:hover { background: var(--primary); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { opacity: 0.9; }

/* Responsive */
@media (max-width: 600px) {
  .header { padding: 12px 16px; }
  .header h1 { font-size: 17px; }
  .quiz-card { padding: 16px; }
  .option-item { padding: 10px 12px; font-size: 13px; }
  .fill-input-row { flex-direction: column; }
  .fill-submit-btn { width: 100%; }
}
</style>
</head>
<body>

<div class="header">
  <h1>五年级科学测试题库</h1>
  <div class="header-stats">
    <span id="stat-total">总题数: 0</span>
    <span id="stat-correct">正确: 0</span>
    <span id="stat-accuracy">正确率: -</span>
  </div>
</div>

<div class="main">
  <!-- Mode Switch -->
  <div class="mode-switch" id="mode-switch">
    <button class="mode-btn active" id="btn-choice-mode" onclick="switchMode('choice')">选择题</button>
    <button class="mode-btn" id="btn-fill-mode" onclick="switchMode('fill')">填空题</button>
  </div>

  <!-- Unit Selector -->
  <div class="unit-selector" id="unit-selector"></div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <button id="btn-shuffle" onclick="shuffleQuestions()">随机打乱</button>
    <button id="btn-remove-correct" onclick="toggleRemoveCorrect()">答对排除</button>
    <button id="btn-timer" onclick="toggleTimer()">计时器</button>
    <button id="btn-wrong-book" onclick="showWrongBook()">错题本</button>
    <button id="btn-records" onclick="showRecords()">学习记录</button>
    <span class="timer-display" id="timer-display" style="display:none">00:00</span>
  </div>

  <!-- Progress -->
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

  <!-- Quiz Area -->
  <div id="quiz-area"></div>

  <!-- Result Panel -->
  <div id="result-panel" style="display:none"></div>

  <!-- Wrong Book -->
  <div id="wrong-book-area" style="display:none"></div>

  <!-- Records -->
  <div id="records-area" style="display:none"></div>
</div>

  {"id": 16, "unit": "第一单元 生物与环境", "lesson": "第6课 食物链和食物网", "question": "食物链中箭头的方向表示什么？", "options": ["A. 谁吃谁的关系", "B. 谁被谁吃的关系（能量流动方向）", "C. 生物的大小关系", "D. 生物的数量关系"], "answer": "B", "explanation": "我们一般用箭头表示食物链中谁被谁吃的关系，即能量流动方向。"},
  {"id": 17, "unit": "第一单元 生物与环境", "lesson": "第6课 食物链和食物网", "question": "一条食物链至少要有几种生物？通常从哪里开始？", "options": ["A. 至少2种，从消费者开始", "B. 至少3种，从绿色植物开始", "C. 至少4种，从肉食动物开始", "D. 至少5种，从分解者开始"], "answer": "B", "explanation": "一条食物链至少要有3种生物，通常从绿色植物开始，到凶猛的肉食动物终止。"},
  {"id": 18, "unit": "第一单元 生物与环境", "lesson": "第6课 食物链和食物网", "question": "在食物链中，能自己制造食物的生物叫什么？", "options": ["A. 消费者", "B. 分解者", "C. 生产者", "D. 捕食者"], "answer": "C", "explanation": "食物链中能自己制造食物的生物叫生产者，直接或间接消费别人制造的食物的生物叫消费者。"},
  {"id": 19, "unit": "第一单元 生物与环境", "lesson": "第6课 食物链和食物网", "question": "在食物链中，数量最多和数量最少的分别是什么？", "options": ["A. 消费者最多，生产者最少", "B. 生产者最多，顶级消费者最少", "C. 生产者最少，消费者最多", "D. 两者数量一样"], "answer": "B", "explanation": "生产者的数量最多，顶级消费者的数量最少。"},
  {"id": 20, "unit": "第一单元 生物与环境", "lesson": "第7课 设计和制作生态瓶", "question": "地球上最大的生态系统是什么？", "options": ["A. 海洋", "B. 森林", "C. 生物圈", "D. 草原"], "answer": "C", "explanation": "地球的生物圈就是最大的生态系统。"},
  {"id": 21, "unit": "第一单元 生物与环境", "lesson": "第7课 设计和制作生态瓶", "question": "生态瓶里的小鱼增多会导致什么现象？", "options": ["A. 小鱼浮到水面的次数减少", "B. 耗氧量增大，小鱼浮到水面次数增多", "C. 氧气量增加", "D. 没有任何变化"], "answer": "B", "explanation": "生态瓶里的小鱼增多，耗氧量增大，小鱼浮到水面的次数会增多，甚至会因缺氧而死亡。"},
  {"id": 22, "unit": "第一单元 生物与环境", "lesson": "第7课 设计和制作生态瓶", "question": "以下关于种群和群落的说法，正确的是？", "options": ["A. 种群是不同种生物的集合", "B. 群落是同种生物的所有个体", "C. 种群指同种生物的所有个体，群落指各种生物种群的集合", "D. 种群和群落是同一个概念"], "answer": "C", "explanation": "种群指同一时间生活在一定自然区域内同种生物的所有个体；群落指相同时间聚集在同一区域内各种生物种群的集合。"},
  {"id": 23, "unit": "第二单元 船的研究", "lesson": "第1课 船的历史", "question": "船的发展历程按时间顺序排列正确的是？", "options": ["A. 帆船→独木舟→蒸汽船→轮船→潜艇", "B. 独木舟→摇橹木船→帆船→蒸汽船→轮船→潜艇", "C. 蒸汽船→独木舟→帆船→轮船→潜艇", "D. 轮船→蒸汽船→帆船→独木舟→潜艇"], "answer": "B", "explanation": "船的发展历程：独木舟→摇橹木船→帆船→蒸汽船→轮船→潜艇。"},
  {"id": 24, "unit": "第二单元 船的研究", "lesson": "第1课 船的历史", "question": "船首采用什么形状可以减小船在水中行驶的阻力？", "options": ["A. 方形", "B. 圆形", "C. 流线型（尖形）", "D. 扁平形"], "answer": "C", "explanation": "船首采用流线型（尖形），可以减小船在行驶中的阻力。"},
  {"id": 25, "unit": "第二单元 船的研究", "lesson": "第2课 用浮的材料造船", "question": "竹筏相比独木舟有什么优点？", "options": ["A. 更容易浸水", "B. 更稳定、载重量更大", "C. 更不牢固", "D. 载重量更小"], "answer": "B", "explanation": "竹筏通过加大船体，增加底面积，比独木舟更稳定、载重量更大。"},
  {"id": 26, "unit": "第二单元 船的研究", "lesson": "第2课 用浮的材料造船", "question": "以下哪种材料属于可以用来造船的浮的材料？", "options": ["A. 橡皮", "B. 铝箔纸", "C. 钢铁", "D. 竹子和木头"], "answer": "D", "explanation": "浮的材料，比如竹子、木头可以制作船。橡皮、铝箔纸、钢铁属于沉的材料。"},
  {"id": 27, "unit": "第二单元 船的研究", "lesson": "第3课 用沉的材料造船", "question": "物体在水中受到的竖直向上托起的力叫什么？", "options": ["A. 重力", "B. 浮力", "C. 摩擦力", "D. 弹力"], "answer": "B", "explanation": "物体在水中会受到竖直向上托起的力，像这样的力是浮力。"},
  {"id": 28, "unit": "第二单元 船的研究", "lesson": "第3课 用沉的材料造船", "question": "为什么把橡皮泥做成船型后更容易浮在水面上？", "options": ["A. 重量变轻了", "B. 浸入水中的体积增大，受到的浮力增大", "C. 橡皮泥的性质改变了", "D. 水的密度变大了"], "answer": "B", "explanation": "相同质量的橡皮泥做成船型后，浸入水中的体积增大，在水中受到的浮力增大，越容易浮在水面。"},
  {"id": 29, "unit": "第二单元 船的研究", "lesson": "第3课 用沉的材料造船", "question": "工程设计的过程正确顺序是什么？", "options": ["A. 设计→问题→制作→测试→完善", "B. 制作→测试→设计→问题→完善", "C. 问题→设计→制作→测试→完善", "D. 完善→测试→制作→设计→问题"], "answer": "C", "explanation": "工程设计的过程：问题→设计→制作→测试→完善。"},
  {"id": 30, "unit": "第二单元 船的研究", "lesson": "第4课 增加船的载重量", "question": "船的载重量与什么因素有关？", "options": ["A. 船的颜色", "B. 船只的体积，体积越大载重量越大", "C. 船的材料颜色", "D. 船的形状是否好看"], "answer": "B", "explanation": "船的载重量与船只的体积有关，相同重量和相同大小的材料，制作的船型体积越大，船的载重量就越大。"},
  {"id": 31, "unit": "第二单元 船的研究", "lesson": "第4课 增加船的载重量", "question": "为了防止弹珠滚动导致船侧翻，可以采用什么方法？", "options": ["A. 把弹珠堆在一起", "B. 把船舱分格来均匀放置货物", "C. 减少弹珠数量", "D. 加快船的速度"], "answer": "B", "explanation": "弹珠滚动容易导致船侧翻，为了均匀放置货物，可以船舱分格来增加船的稳定性。"},
  {"id": 32, "unit": "第二单元 船的研究", "lesson": "第5课 给船装上动力", "question": "船可以通过什么装置来控制方向？", "options": ["A. 船帆", "B. 船桨", "C. 船舵", "D. 锚"], "answer": "C", "explanation": "船可以通过船舵来控制方向。"},
  {"id": 33, "unit": "第二单元 船的研究", "lesson": "第5课 给船装上动力", "question": "潜水艇是如何实现上浮和下沉的？", "options": ["A. 改变艇身颜色", "B. 通过进水增加重力下沉，排水减小重力上浮", "C. 通过改变速度", "D. 通过改变形状"], "answer": "B", "explanation": "可以通过进水、排水改变潜水艇的重力：进水后重力增加，潜水艇下沉；排水后重力减小，潜水艇上浮。"},
  {"id": 34, "unit": "第二单元 船的研究", "lesson": "第6、7课 设计制作与测试小船", "question": "设计小船时需要考虑的因素不包括以下哪一项？", "options": ["A. 船的大小和形状", "B. 载重量和稳固性", "C. 动力系统和材料成本", "D. 船的颜色是否鲜艳"], "answer": "D", "explanation": "设计小船时需要考虑的因素：船的大小、船的形状、船体材料、载重量、稳固性、动力系统、材料成本。"},
  {"id": 35, "unit": "第三单元 环境与我们", "lesson": "第1课 地球——宇宙的奇迹", "question": "以下哪项不是地球为生命存在提供的必要条件？", "options": ["A. 有液态的水和大气层", "B. 有完整的臭氧层抵御紫外线", "C. 与太阳距离适中，温度适宜", "D. 火星上有大量的氧气"], "answer": "D", "explanation": "地球为生命存在提供了液态水、大气层、臭氧层、适宜的温度等条件。火星大气基本不含氧气，不能提供生命必要条件。"},
  {"id": 36, "unit": "第三单元 环境与我们", "lesson": "第1课 地球——宇宙的奇迹", "question": "八大行星中，唯有哪个行星的大气中有大量的氧气？", "options": ["A. 火星", "B. 金星", "C. 地球", "D. 木星"], "answer": "C", "explanation": "八大行星中唯有地球的大气中有大量的氧气，地球距离太阳不远不近，保证地球上有液态水。"},
  {"id": 37, "unit": "第三单元 环境与我们", "lesson": "第2课 我们面临的环境问题", "question": "以下哪种不属于地球面临的环境问题？", "options": ["A. 大气污染和水污染", "B. 全球变暖", "C. 固体废弃物污染", "D. 地震"], "answer": "D", "explanation": "地球面临着多种环境问题，包括：大气污染、水资源短缺、水污染、固体废弃物污染、全球变暖、光污染、噪声污染等。地震属于自然灾害，不属于人类活动引发的环境问题。"},
  {"id": 38, "unit": "第三单元 环境与我们", "lesson": "第2课 我们面临的环境问题", "question": "二氧化碳排放过多会导致什么环境问题？", "options": ["A. 酸雨", "B. 全球变暖、冰川融化、海平面上升", "C. 雾霾", "D. 臭氧层空洞"], "answer": "B", "explanation": "二氧化碳会导致全球变暖从而出现冰川融化、海平面上升。"},
  {"id": 39, "unit": "第三单元 环境与我们", "lesson": "第2课 我们面临的环境问题", "question": "二氧化硫会造成什么环境问题？", "options": ["A. 全球变暖", "B. 水体富营养化", "C. 酸雨，进而毁坏建筑", "D. 噪声污染"], "answer": "C", "explanation": "二氧化硫会造成酸雨进而毁坏建筑。"},
  {"id": 40, "unit": "第三单元 环境与我们", "lesson": "第3课 珍惜水资源", "question": "地球上人类难以利用的淡水资源中，占比最大的是什么？", "options": ["A. 河流水", "B. 地下水", "C. 山区、两极地区的冰与永久积雪（69.7%）", "D. 淡水湖水"], "answer": "C", "explanation": "地球上可供利用的淡水资源中，有69.7%是人类难以利用的山区、两极地区的冰与永久积雪。"},
  {"id": 41, "unit": "第三单元 环境与我们", "lesson": "第3课 珍惜水资源", "question": "以下哪种不属于有效的节水措施？", "options": ["A. 用淋浴代替盆浴", "B. 用洗米水浇花", "C. 采用滴灌等先进灌溉技术", "D. 让水龙头一直开着流水"], "answer": "D", "explanation": "节约用水措施包括及时关闭水龙头、用淋浴代替盆浴、用洗米水浇花、采用滴灌技术等。"},
  {"id": 42, "unit": "第三单元 环境与我们", "lesson": "第4课 解决垃圾问题", "question": "过期药品属于哪类垃圾？", "options": ["A. 可回收垃圾", "B. 厨余垃圾", "C. 有害垃圾", "D. 其他垃圾"], "answer": "C", "explanation": "有害垃圾包括：过期药品、废电池、水银温度计、废灯管等。"},
  {"id": 43, "unit": "第三单元 环境与我们", "lesson": "第4课 解决垃圾问题", "question": "废纸制品和塑料制品属于哪类垃圾？", "options": ["A. 有害垃圾", "B. 厨余垃圾", "C. 可回收垃圾", "D. 其他垃圾"], "answer": "C", "explanation": "可回收垃圾包括：纸制品、金属制品、塑料制品、玻璃制品。"},
  {"id": 44, "unit": "第三单元 环境与我们", "lesson": "第4课 解决垃圾问题", "question": "利用微生物将生活垃圾中的有机质分解转化为养分的方法叫什么？", "options": ["A. 填埋法", "B. 焚烧法", "C. 堆肥法", "D. 回收法"], "answer": "C", "explanation": "堆肥法是利用微生物，将生活垃圾中有机质分解、腐熟转化为养分和腐殖质的无害化处理方法。"},
  {"id": 45, "unit": "第三单元 环境与我们", "lesson": "第5课 合理利用能源", "question": "目前我国的电能来源中占比最大的是什么？", "options": ["A. 水电", "B. 太阳能发电", "C. 核电", "D. 火电（煤燃烧发出的电）"], "answer": "D", "explanation": "我国的电能主要有水电、太阳能发电、风电、核电和火电。目前火电所占的比例最大。"},
  {"id": 46, "unit": "第三单元 环境与我们", "lesson": "第5课 合理利用能源", "question": "温室效应是如何产生的？", "options": ["A. 氧气过多", "B. 人类过度消耗化石能源增加的二氧化碳使地表附近大气温度上升", "C. 氮气增加", "D. 水蒸气过多"], "answer": "B", "explanation": "温室效应：人类过度消耗化石能源增加的二氧化碳，使地表附近的大气温度上升，被称作温室效应。"},
  {"id": 47, "unit": "第三单元 环境与我们", "lesson": "第5课 合理利用能源", "question": "以下哪种属于可再生能源？", "options": ["A. 煤", "B. 石油", "C. 天然气", "D. 太阳能"], "answer": "D", "explanation": "可再生能源包括太阳能、风能、地热能、海洋能等非化石能源形式。煤、石油、天然气是不可再生能源。"},
  {"id": 48, "unit": "第三单元 环境与我们", "lesson": "第6课 让资源再生", "question": "以下哪种资源属于可再生资源？", "options": ["A. 煤", "B. 石油", "C. 天然气", "D. 纸"], "answer": "D", "explanation": "有些资源被消耗就不可再生，如煤、石油、天然气等。有些资源是可再生的，如塑料、玻璃、金属、织物和纸。"},
  {"id": 49, "unit": "第三单元 环境与我们", "lesson": "第6课 让资源再生", "question": "一张再生纸的制作正确过程是什么？", "options": ["A. 搅拌→撕碎→平铺→挤压吸水→通风晾干", "B. 撕碎→搅拌→平铺→挤压吸水→通风晾干", "C. 平铺→撕碎→搅拌→通风晾干→挤压吸水", "D. 撕碎→平铺→搅拌→通风晾干→挤压吸水"], "answer": "B", "explanation": "一张再生纸的制作过程：撕碎→搅拌→平铺→挤压吸水→通风晾干。"},
  {"id": 50, "unit": "第三单元 环境与我们", "lesson": "第6课 让资源再生", "question": "谁改进了造纸术？", "options": ["A. 张衡", "B. 毕昇", "C. 东汉蔡伦", "D. 沈括"], "answer": "C", "explanation": "东汉蔡伦改进了造纸术。"},
  {"id": 51, "unit": "第三单元 环境与我们", "lesson": "第7课 分析一个实际的环境问题", "question": "面对环境问题，我们应该怎么做？", "options": ["A. 只从自身角度考虑", "B. 需要学会协调和放弃，从自身角色角度提出方案，也要换位思考", "C. 完全放弃自己的利益", "D. 什么都不做"], "answer": "B", "explanation": "为了达成可行的解决办法，需要学会协调和放弃。既要从自身角色角度提出方案，也要换位思考。"},
  {"id": 52, "unit": "第四单元 热", "lesson": "第1课 温度与水的变化", "question": "标准大气压下，水的沸点是多少？", "options": ["A. 90℃", "B. 100℃", "C. 110℃", "D. 0℃"], "answer": "B", "explanation": "标准大气压下，水的沸点是100℃。水沸腾时剧烈冒气泡、有水蒸气产生。"},
  {"id": 53, "unit": "第四单元 热", "lesson": "第1课 温度与水的变化", "question": "标准大气压下，水的凝固点是多少？", "options": ["A. 100℃", "B. 50℃", "C. 0℃", "D. -10℃"], "answer": "C", "explanation": "水结冰时的温度叫水的凝固点，标准大气压下水的凝固点是0℃。"},
  {"id": 54, "unit": "第四单元 热", "lesson": "第1课 温度与水的变化", "question": "关于加热过程中水的温度变化，以下说法正确的是？", "options": ["A. 水温一直上升到沸腾后继续上升", "B. 水温上升到100℃沸腾后，继续加热温度保持不变", "C. 水温上升到100℃沸腾后温度会下降", "D. 水温不变"], "answer": "B", "explanation": "加热过程中，水吸热温度上升直至100℃沸腾，继续加热温度保持在100℃。停止加热，水温会下降。"},
  {"id": 55, "unit": "第四单元 热", "lesson": "第1课 温度与水的变化", "question": "物质通常以哪三种形态存在？", "options": ["A. 固态、液态、气态", "B. 固态、半固态、液态", "C. 液态、气态、等离子态", "D. 固态、液态、胶态"], "answer": "A", "explanation": "物质通常以固态、液态、气态的形态存在，物态变化取决于温度等。"},
  {"id": 56, "unit": "第四单元 热", "lesson": "第2课 水的蒸发和凝结", "question": "水的蒸发过程是吸热还是放热？", "options": ["A. 吸热", "B. 放热", "C. 既不吸热也不放热", "D. 有时吸热有时放热"], "answer": "A", "explanation": "水的蒸发过程吸收热量，水温越高，水蒸发越快。"},
  {"id": 57, "unit": "第四单元 热", "lesson": "第2课 水的蒸发和凝结", "question": "水蒸气凝结成水的过程是吸热还是放热？", "options": ["A. 吸热", "B. 放热", "C. 既不吸热也不放热", "D. 取决于温度"], "answer": "B", "explanation": "水蒸气凝结成水的过程放出热量。温度越低，凝结越快。"},
  {"id": 58, "unit": "第四单元 热", "lesson": "第2课 水的蒸发和凝结", "question": "水沸腾时看到的白气是什么？", "options": ["A. 水蒸气", "B. 水蒸气凝结成的小水滴", "C. 二氧化碳", "D. 烟"], "answer": "B", "explanation": "水蒸气肉眼看不见，所以水沸腾时看到的白气不是水蒸气，而是水蒸气凝结的小水滴。"},
  {"id": 59, "unit": "第四单元 热", "lesson": "第2课 水的蒸发和凝结", "question": "云是怎样形成的？", "options": ["A. 水在高空中直接变成固体", "B. 水蒸气在高空中遇冷凝结成小水珠或凝华成小冰晶", "C. 地面上的水直接升到天空", "D. 风吹起来的"], "answer": "B", "explanation": "云：水蒸气在高空中遇冷凝结成小水珠或凝华成小冰晶便形成了云。"},
  {"id": 60, "unit": "第四单元 热", "lesson": "第2课 水的蒸发和凝结", "question": "霜是怎样形成的？", "options": ["A. 雨水冻结", "B. 水蒸气遇到0℃以下的物体凝华成固态小冰晶", "C. 露水冻结", "D. 雪融化后再冻结"], "answer": "B", "explanation": "霜：地面附近的水蒸气遇到冷的物体（温度在0℃以下），凝华成固态的小冰晶，便形成了霜。"},
  {"id": 61, "unit": "第四单元 热", "lesson": "第3课 温度不同的物体相互接触", "question": "热在物体之间传递的方向是怎样的？", "options": ["A. 从温度低的物体传向温度高的物体", "B. 从温度高的物体传向温度低的物体", "C. 从体积大的物体传向体积小的物体", "D. 从质量大的物体传向质量小的物体"], "answer": "B", "explanation": "热通常从温度高的物体传向温度低的物体。"},
  {"id": 62, "unit": "第四单元 热", "lesson": "第3课 温度不同的物体相互接触", "question": "两个温度不同的物体相互接触，最终会怎样？", "options": ["A. 各自保持原来的温度", "B. 温度高的更高，温度低的更低", "C. 最终温度相同，达到热平衡", "D. 温度低的变高，温度高的不变"], "answer": "C", "explanation": "两个温度不同的物体相互接触，最终温度相同，达到热平衡。"},
  {"id": 63, "unit": "第四单元 热", "lesson": "第4课 热在金属中的传递", "question": "热传递有哪三种方式？", "options": ["A. 热传导、热辐射、热散发", "B. 热传导、热对流、热辐射", "C. 热对流、热辐射、热挥发", "D. 热传导、热对流、热挥发"], "answer": "B", "explanation": "热传递有热传导、热对流、热辐射三种传递方式。"},
  {"id": 64, "unit": "第四单元 热", "lesson": "第4课 热在金属中的传递", "question": "太阳的热量以什么方式传递到地球？", "options": ["A. 热传导", "B. 热对流", "C. 热辐射", "D. 热交换"], "answer": "C", "explanation": "太阳的热量以热辐射的形式传递到地球。热辐射是物体以电磁波的形式向外发射热能的过程。"},
  {"id": 65, "unit": "第四单元 热", "lesson": "第4课 热在金属中的传递", "question": "用火加热金属条的中部，金属条上的蜡会怎样熔化？", "options": ["A. 只有中部熔化", "B. 从中部受热部分开始，向两端依次熔化", "C. 从两端开始向中部熔化", "D. 全部同时熔化"], "answer": "B", "explanation": "用火加热金属条的中部，金属条上的蜡从中部受热部分开始熔化，然后向两端依次熔化。"},
  {"id": 66, "unit": "第四单元 热", "lesson": "第5课 热在水中的传递", "question": "热在液体和气体中的主要传递方式是什么？", "options": ["A. 热传导", "B. 热对流", "C. 热辐射", "D. 热交换"], "answer": "B", "explanation": "热在液体和气体中的主要传递方式是热对流。"},
  {"id": 67, "unit": "第四单元 热", "lesson": "第5课 热在水中的传递", "question": "加热试管中的水时，热水和冷水的流动方向是怎样的？", "options": ["A. 热水向下流动，冷水向上流动", "B. 热水向上流动，冷水向下流动，形成对流", "C. 两者都不动", "D. 两者混合不动"], "answer": "B", "explanation": "加热后的热水向上流动，冷水向下流动，形成对流，使整杯水的温度趋于相同。"},
  {"id": 68, "unit": "第四单元 热", "lesson": "第5课 热在水中的传递", "question": "空调和暖气分别应该安装在房间的什么位置？", "options": ["A. 空调在上方，暖气在下方", "B. 空调在下方，暖气在上方", "C. 都安装在上方", "D. 都安装在下方"], "answer": "A", "explanation": "冷空气下降，空调应安装在房间上方；热空气上升，暖气应安装在房间下方。"},
  {"id": 69, "unit": "第四单元 热", "lesson": "第6课 哪个传热快", "question": "以下哪种材料属于热的良导体？", "options": ["A. 塑料", "B. 木头", "C. 陶瓷", "D. 铜"], "answer": "D", "explanation": "热的良导体有铜、铝、铁等金属材料。热的不良导体有塑料、木头、陶瓷、空气等材料。"},
  {"id": 70, "unit": "第四单元 热", "lesson": "第6课 哪个传热快", "question": "铜、铝、铁三种材料的导热性能排序正确的是？", "options": ["A. 铁＞铝＞铜", "B. 铝＞铜＞铁", "C. 铜＞铝＞铁", "D. 铜＞铁＞铝"], "answer": "C", "explanation": "铜、铝、铁三种材料的导热性能排序：铜＞铝＞铁。"},
  {"id": 71, "unit": "第四单元 热", "lesson": "第6课 哪个传热快", "question": "为什么锅身用金属（热的良导体），锅柄用塑料或木头（热的不良导体）？", "options": ["A. 锅身需要快速传热，锅柄需要防止烫伤", "B. 两者都需要快速传热", "C. 锅身需要保温，锅柄需要散热", "D. 没有特别原因"], "answer": "A", "explanation": "锅身需要用热的良导体，因为传热性能好；锅柄需要用热的不良导体，因为传热性能差，防止烫伤。"},
  {"id": 72, "unit": "第四单元 热", "lesson": "第7课 做个保温杯", "question": "制作保温杯时应选择什么材料？", "options": ["A. 热的良导体", "B. 热的不良导体", "C. 金属材料", "D. 任何材料都可以"], "answer": "B", "explanation": "制作保温杯时，应选择热的不良导体。传热性能越差，隔绝内部与外界接触，保温效果越好。"},
  {"id": 73, "unit": "第四单元 热", "lesson": "第7课 做个保温杯", "question": "保温瓶内胆中间为真空，主要隔绝了什么？", "options": ["A. 只有热传导", "B. 只有热对流", "C. 热传导和热对流", "D. 热辐射"], "answer": "C", "explanation": "保温瓶内胆中间为真空，无热传导与热对流。真空可以隔绝热传导和热对流。"},
  {"id": 74, "unit": "第四单元 热", "lesson": "第7课 做个保温杯", "question": "保温瓶内胆内壁镀银的作用是什么？", "options": ["A. 增加热传导", "B. 减少热辐射", "C. 增加热对流", "D. 美观"], "answer": "B", "explanation": "保温瓶内胆内壁镀银，减少热辐射。"},
  {"id": 75, "unit": "第四单元 热", "lesson": "第7课 做个保温杯", "question": "保温杯既可以保冷也可以保热，以下说法正确的是？", "options": ["A. 保温杯只能保热不能保冷", "B. 保温杯只能保冷不能保热", "C. 保冷是减慢杯内热量散失，保热是隔绝外界热量进入", "D. 保冷和保热原理完全不同"], "answer": "C", "explanation": "保温杯既可以保冷（减慢杯内热量散失），也可以保热（隔绝外界热量进入）。"}
];

const FILL_DATA = [{"id": 1, "unit": "第一单元《生物与环境》", "lesson": "第 1 课时\t种子发芽实验", "question": "许多植物的新生命是从______发芽开始的。", "answer": "种子"}, {"id": 2, "unit": "第一单元《生物与环境》", "lesson": "第 1 课时\t种子发芽实验", "question": "为了______，对比实验时只能改变一个条件，必须保持其他条件相同。", "answer": "保证实验的准确性"}, {"id": 3, "unit": "第一单元《生物与环境》", "lesson": "第 1 课时\t种子发芽实验", "question": "为了保证实验的准确性，对比实验时只能改变______，必须保持其他条件相同。", "answer": "一个条件"}, {"id": 4, "unit": "第一单元《生物与环境》", "lesson": "第 1 课时\t种子发芽实验", "question": "为了保证实验的准确性，对比实验时只能改变一个条件，必须保持______。", "answer": "其他条件相同"}, {"id": 5, "unit": "第一单元《生物与环境》", "lesson": "第 1 课时\t种子发芽实验", "question": "研究绿豆种子发芽需要的条件时，用至少 3 粒种子做实验，是为了避免______的可能性，减少偶然性的发生，可以让实验更严谨。", "answer": "种子自身不能萌发"}, {"id": 6, "unit": "第一单元《生物与环境》", "lesson": "第 1 课时\t种子发芽实验", "question": "研究绿豆种子发芽需要的条件时，用至少 3 粒种子做实验，是为了避免种子自身不能萌发的可能性，______的发生，可以让实验更严谨。", "answer": "减少偶然性"}, {"id": 7, "unit": "第一单元《生物与环境》", "lesson": "第 1 课时\t种子发芽实验", "question": "研究绿豆种子发芽需要的条件时，用至少 3 粒种子做实验，是为了避免种子自身不能萌发的可能性，减少偶然性的发生，可以让实验______。", "answer": "更严谨"}, {"id": 8, "unit": "第一单元《生物与环境》", "lesson": "第 1 课时\t种子发芽实验", "question": "实验计划步骤：______。", "answer": "明确问题-作出假设-设计方案-实施方案-分析结果-得出结论"}, {"id": 9, "unit": "第一单元《生物与环境》", "lesson": "第 2 课时 比较种子发芽实验", "question": "种子发芽需要______、适量的水和充足的空气。", "answer": "适宜的温度"}, {"id": 10, "unit": "第一单元《生物与环境》", "lesson": "第 2 课时 比较种子发芽实验", "question": "种子发芽需要适宜的温度、______和充足的空气。", "answer": "适量的水"}, {"id": 11, "unit": "第一单元《生物与环境》", "lesson": "第 2 课时 比较种子发芽实验", "question": "种子发芽需要适宜的温度、适量的水和______。", "answer": "充足的空气"}, {"id": 12, "unit": "第一单元《生物与环境》", "lesson": "第 2 课时 比较种子发芽实验", "question": "______和阳光不是种子萌发的必要条件。", "answer": "土壤"}, {"id": 13, "unit": "第一单元《生物与环境》", "lesson": "第 2 课时 比较种子发芽实验", "question": "土壤和______不是种子萌发的必要条件。", "answer": "阳光"}, {"id": 14, "unit": "第一单元《生物与环境》", "lesson": "第 2 课时 比较种子发芽实验", "question": "水太多种子会因为______而腐烂。", "answer": "缺氧"}, {"id": 15, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "空气是一种______物质，氮气和氧气是空气的主要成分。", "answer": "混合"}, {"id": 16, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "空气是一种混合物质，______和氧气是空气的主要成分。", "answer": "氮气"}, {"id": 17, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "空气是一种混合物质，氮气和______是空气的主要成分。", "answer": "氧气"}, {"id": 18, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "植物会______的环境生长-向光性。", "answer": "趋向有利于自身"}, {"id": 19, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "植物会趋向有利于自身的环境生长-______。", "answer": "向光性"}, {"id": 20, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "植物的生长需要合适的环境条件。当环境改变的时候，植物具有一定的______。相对的，环境也会影响植物。", "answer": "适应环境的能力"}, {"id": 21, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "芭蕉、香蕉树______，增加蒸腾作用，适应雨水多的环境", "answer": "叶片宽大"}, {"id": 22, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "芭蕉、香蕉树叶片宽大，______蒸腾作用，适应雨水多的环境", "answer": "增加"}, {"id": 23, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "芭蕉、香蕉树叶片宽大，增加蒸腾作用，适应______的环境", "answer": "雨水多"}, {"id": 24, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "松树、仙人掌______，减少蒸腾作用，适应干旱环境", "answer": "针刺叶"}, {"id": 25, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "松树、仙人掌针刺叶，______蒸腾作用，适应干旱环境", "answer": "减少"}, {"id": 26, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "松树、仙人掌针刺叶，减少蒸腾作用，适应______环境", "answer": "干旱"}, {"id": 27, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "植物的叶可以进行______。在光照的条件下，植物吸收空气中的二氧化碳和水分，在绿色叶片中制造生存所需的养 料，并释放出氧气。", "answer": "光合作用"}, {"id": 28, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "植物的叶可以进行光合作用。在光照的条件下，植物吸收空气中的______，在绿色叶片中制造生存所需的养 料，并释放出氧气。", "answer": "二氧化碳和水分"}, {"id": 29, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "植物的叶可以进行光合作用。在光照的条件下，植物吸收空气中的二氧化碳和水分，在绿色叶片中制造生存所需的养 料，并释放出______。", "answer": "氧气"}, {"id": 30, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "阳光下的绿豆苗茎______；黑暗处的绿豆苗茎细长，黄色，较高。", "answer": "更粗壮、矮小，呈绿色"}, {"id": 31, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "阳光下的绿豆苗茎更粗壮、矮小，呈绿色；黑暗处的绿豆苗______。", "answer": "茎细长，黄色，较高"}, {"id": 32, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "绿豆苗的健康生长需要______，不需要土壤。", "answer": "阳光、空气、水、适宜的温度"}, {"id": 33, "unit": "第一单元《生物与环境》", "lesson": "第 3 课时 绿豆苗的生长", "question": "绿豆苗的健康生长需要阳光、空气、水、适宜的温度，不需要______。", "answer": "土壤"}, {"id": 34, "unit": "第一单元《生物与环境》", "lesson": "第 4 课时 蚯蚓的选择", "question": "蚯蚓喜欢生活在______的环境里。", "answer": "潮湿、阴暗"}, {"id": 35, "unit": "第一单元《生物与环境》", "lesson": "第 4 课时 蚯蚓的选择", "question": "用______和模拟实验的方法研究蚯蚓适宜生活的环境时，", "answer": "对比实验"}, {"id": 36, "unit": "第一单元《生物与环境》", "lesson": "第 4 课时 蚯蚓的选择", "question": "用对比实验和______的方法研究蚯蚓适宜生活的环境时，", "answer": "模拟实验"}, {"id": 37, "unit": "第一单元《生物与环境》", "lesson": "第 4 课时 蚯蚓的选择", "question": "探究蚯蚓对潮湿环境的选择，实验用 10 条蚯蚓（增加样本多样性，减少实验误差），蚯蚓放在潮湿和干燥的交界处。3.动物与植物一样，也需要生长在一定的环境中，当环境改变后它们也会努力去______的变化。", "answer": "适应环境"}, {"id": 38, "unit": "第一单元《生物与环境》", "lesson": "第 4 课时 蚯蚓的选择", "question": "青蛙的______，使它们不显眼而不被捕食者发现", "answer": "体色总是和周围环境相似"}, {"id": 39, "unit": "第一单元《生物与环境》", "lesson": "第 4 课时 蚯蚓的选择", "question": "企鹅和北极狼都生活在冰天雪地的环境中，因此它们有厚厚的______帮助保暖", "answer": "皮毛"}, {"id": 40, "unit": "第一单元《生物与环境》", "lesson": "第 4 课时 蚯蚓的选择", "question": "企鹅和北极狼都生活在冰天雪地的环境中，因此它们有厚厚的皮毛帮助______", "answer": "保暖"}, {"id": 41, "unit": "第一单元《生物与环境》", "lesson": "第 4 课时 蚯蚓的选择", "question": "天鹅有光滑的______，可以使它们的身体能很快将水甩干，而且脚上有蹼方便在水中游泳", "answer": "羽毛"}, {"id": 42, "unit": "第一单元《生物与环境》", "lesson": "第 4 课时 蚯蚓的选择", "question": "天鹅有光滑的羽毛，可以使它们的身体能很快将水甩干，而且______方便在水中游泳", "answer": "脚上有蹼"}, {"id": 43, "unit": "第一单元《生物与环境》", "lesson": "第 5 课时 当环境改变了", "question": "1.当环境改变了，动物会有一些特殊的行为努力______，如冬眠、迁徙、换毛等。", "answer": "适应新环境"}, {"id": 44, "unit": "第一单元《生物与环境》", "lesson": "第 5 课时 当环境改变了", "question": "1.当环境改变了，动物会有一些特殊的行为努力适应新环境，如______等。", "answer": "冬眠、迁徙、换毛"}, {"id": 45, "unit": "第一单元《生物与环境》", "lesson": "第 5 课时 当环境改变了", "question": "青蛙春天从蝌蚪发育成青蛙， 夏天捕食昆虫， 秋天挖洞，冬天______。", "answer": "冬 眠"}, {"id": 46, "unit": "第一单元《生物与环境》", "lesson": "第 5 课时 当环境改变了", "question": "丹顶鹤是我国的珍稀动物，会通过______。春季气候回暖，丹顶鹤离开过冬地，迁往东北繁殖地；3 月末 4 月初，繁殖地气候宜人，丹顶鹤开始配对和筑巢；入秋后，气温降低、食物减少，丹顶鹤又迁徙回温暖的南方过冬。", "answer": "迁徙来适应气温的变化"}, {"id": 47, "unit": "第一单元《生物与环境》", "lesson": "第 5 课时 当环境改变了", "question": "丹顶鹤是我国的珍稀动物，会通过迁徙来适应气温的变化。春季气候回暖，丹顶鹤离开过冬地，迁往东北繁殖地；3 月末 4 月初，繁殖地气候宜人，丹顶鹤开始______；入秋后，气温降低、食物减少，丹顶鹤又迁徙回温暖的南方过冬。", "answer": "配对和筑巢"}, {"id": 48, "unit": "第一单元《生物与环境》", "lesson": "第 5 课时 当环境改变了", "question": "人类可以通过建立______来保护动植物。", "answer": "自然保护区"}, {"id": 49, "unit": "第一单元《生物与环境》", "lesson": "第 5 课时 当环境改变了", "question": "在野外遇到掉队的鸟______， 不打扰就是最好的帮助。", "answer": "不可以带回家"}, {"id": 50, "unit": "第一单元《生物与环境》", "lesson": "第 6 课时 食物链和食物网", "question": "生物的生存除了需要一定的自然条件外，它们彼此之间是______，互相影响的。", "answer": "相互依赖"}, {"id": 51, "unit": "第一单元《生物与环境》", "lesson": "第 6 课时 食物链和食物网", "question": "生物的生存除了需要一定的自然条件外，它们彼此之间是相互依赖，______的。", "answer": "互相影响"}, {"id": 52, "unit": "第一单元《生物与环境》", "lesson": "第 6 课时 食物链和食物网", "question": "生物之间，这种像“链条”一样的“______”的食物关系叫作食物链。", "answer": "吃与被吃"}, {"id": 53, "unit": "第一单元《生物与环境》", "lesson": "第 6 课时 食物链和食物网", "question": "生物之间，这种像“链条”一样的“吃与被吃”的______叫作食物链。", "answer": "食物关系"}, {"id": 54, "unit": "第一单元《生物与环境》", "lesson": "第 6 课时 食物链和食物网", "question": "生物之间，这种像“链条”一样的“吃与被吃”的食物关系叫作______。", "answer": "食物链"}, {"id": 55, "unit": "第一单元《生物与环境》", "lesson": "第 6 课时 食物链和食物网", "question": "生物之间复杂的食物关系形成一个网状结构，叫作______。；物种越丰富，食物网越稳定。", "answer": "食物网"}, {"id": 56, "unit": "第一单元《生物与环境》", "lesson": "第 6 课时 食物链和食物网", "question": "生物之间复杂的食物关系形成一个网状结构，叫作食物网。；物种越______，食物网越稳定。", "answer": "丰富"}, {"id": 57, "unit": "第一单元《生物与环境》", "lesson": "第 6 课时 食物链和食物网", "question": "生物之间复杂的食物关系形成一个网状结构，叫作食物网。；物种越丰富，食物网越______。", "answer": "稳定"}, {"id": 58, "unit": "第一单元《生物与环境》", "lesson": "第 6 课时 食物链和食物网", "question": "一条食物链至少要有 3 种生物，通常从绿色植物开始，到凶猛的肉食动物终止。______不出现在食物链中。", "answer": "分解者"}, {"id": 59, "unit": "第一单元《生物与环境》", "lesson": "第 6 课时 食物链和食物网", "question": "植物通过______获得生长所需的物质和能量，植物又通过直接或间接被其它动物食用，使植物体内的有机物、能量 通过食物链在不同动物中传递。", "answer": "光合作用"}, {"id": 60, "unit": "第一单元《生物与环境》", "lesson": "第 6 课时 食物链和食物网", "question": "植物通过光合作用获得生长所需的______，植物又通过直接或间接被其它动物食用，使植物体内的有机物、能量 通过食物链在不同动物中传递。", "answer": "物质和能量"}, {"id": 61, "unit": "第一单元《生物与环境》", "lesson": "第 6 课时 食物链和食物网", "question": "植物通过光合作用获得生长所需的物质和能量，植物又通过______，使植物体内的有机物、能量 通过食物链在不同动物中传递。", "answer": "直接或间接被其它动物食用"}, {"id": 62, "unit": "第一单元《生物与环境》", "lesson": "第 6 课时 食物链和食物网", "question": "植物通过光合作用获得生长所需的物质和能量，植物又通过直接或间接被其它动物食用，使植物体内的有机物、能量 通过______在不同动物中传递。", "answer": "食物链"}, {"id": 63, "unit": "第一单元《生物与环境》", "lesson": "第 6 课时 食物链和食物网", "question": "植物通过光合作用获得生长所需的物质和能量，植物又通过直接或间接被其它动物食用，使植物体内的有机物、能量 通过食物链在不同动物中______。", "answer": "传递"}, {"id": 64, "unit": "第一单元《生物与环境》", "lesson": "第 6 课时 食物链和食物网", "question": "食物链中能自己制造食物的生物叫______，直接或间接消费别人制造的食物的生物叫消费者。", "answer": "生产者"}, {"id": 65, "unit": "第一单元《生物与环境》", "lesson": "第 6 课时 食物链和食物网", "question": "食物链中能自己制造食物的生物叫生产者，直接或间接消费别人制造的食物的生物叫______。", "answer": "消费者"}, {"id": 66, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "群落里的______与环境中的非生物相互联系相互影响，构成了一个整体，我们把这个整体叫作生态系统。地球的生 物圈就是最大的生态系统。", "answer": "各种生物"}, {"id": 67, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "群落里的各种生物与______相互联系相互影响，构成了一个整体，我们把这个整体叫作生态系统。地球的生 物圈就是最大的生态系统。", "answer": "环境中的非生物"}, {"id": 68, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "群落里的各种生物与环境中的非生物相互联系相互影响，构成了一个整体，我们把这个整体叫作______。地球的生 物圈就是最大的生态系统。", "answer": "生态系统"}, {"id": 69, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "群落里的各种生物与环境中的非生物相互联系相互影响，构成了一个整体，我们把这个整体叫作生态系统。______ 物圈就是最大的生态系统。", "answer": "地球的生"}, {"id": 70, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "群落里的各种生物与环境中的非生物相互联系相互影响，构成了一个整体，我们把这个整体叫作生态系统。地球的生 ______就是最大的生态系统。", "answer": "物圈"}, {"id": 71, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态系统中的植物为动物提供了______和氧气，动物的粪便为植物的生长提供了需要的营养。", "answer": "食物"}, {"id": 72, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态系统中的植物为动物提供了食物和______，动物的粪便为植物的生长提供了需要的营养。", "answer": "氧气"}, {"id": 73, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态系统中的植物为动物提供了食物和氧气，动物的粪便为植物的生长提供了______。", "answer": "需要的营养"}, {"id": 74, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "制作生态瓶的参考步骤：先在桶底装入一层淘洗干净的沙（或加______），再装入大半桶自然水域中的水。在桶里种 上自己准备的水草，植物存活后，再放入小动物。", "answer": "小石子"}, {"id": 75, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "制作生态瓶的参考步骤：先在桶底装入一层淘洗干净的沙（或加小石子），再装入大半桶______。在桶里种 上自己准备的水草，植物存活后，再放入小动物。", "answer": "自然水域中的水"}, {"id": 76, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "制作生态瓶的参考步骤：先在桶底装入一层淘洗干净的沙（或加小石子），再装入大半桶自然水域中的水。在桶里种 上自己准备的______，植物存活后，再放入小动物。", "answer": "水草"}, {"id": 77, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "制作生态瓶的参考步骤：先在桶底装入一层淘洗干净的沙（或加小石子），再装入大半桶自然水域中的水。在桶里种 上自己准备的水草，植物存活后，再放入______。", "answer": "小动物"}, {"id": 78, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生物与生物之间是______、相互作用和相互制约的。", "answer": "相互依存"}, {"id": 79, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生物与生物之间是相互依存、______和相互制约的。", "answer": "相互作用"}, {"id": 80, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生物与生物之间是相互依存、相互作用和______的。", "answer": "相互制约"}, {"id": 81, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态瓶里的水量______，动植物的生存空间减小，氧气量减少，生态瓶中小鱼浮到水面的次数增多", "answer": "减少"}, {"id": 82, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态瓶里的水量减少，动植物的生存空间减小，氧气量减少，生态瓶中小鱼浮到水面的______", "answer": "次数增多"}, {"id": 83, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态瓶里的水体______，产生的氧气量增多，小鱼浮到水面的次数会减少。", "answer": "增多"}, {"id": 84, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态瓶里的水体增多，产生的氧气量增多，小鱼浮到水面的______。", "answer": "次数会减少"}, {"id": 85, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态瓶里的小鱼增多，耗氧量______，小鱼浮到水面的次数会增多。如果小鱼增加两倍或四倍，那么小鱼浮到水面的次 数会越来越多，甚至会因缺氧而死亡。", "answer": "增大"}, {"id": 86, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态瓶里的小鱼增多，耗氧量增大，小鱼浮到水面的______。如果小鱼增加两倍或四倍，那么小鱼浮到水面的次 数会越来越多，甚至会因缺氧而死亡。", "answer": "次数会增多"}, {"id": 87, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态瓶里的小鱼增多，耗氧量增大，小鱼浮到水面的次数会增多。如果小鱼增加两倍或四倍，那么小鱼浮到水面的次 ______，甚至会因缺氧而死亡。", "answer": "数会越来越多"}, {"id": 88, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态瓶里的小鱼增多，耗氧量增大，小鱼浮到水面的次数会增多。如果小鱼增加两倍或四倍，那么小鱼浮到水面的次 数会越来越多，甚至会______。", "answer": "因缺氧而死亡"}, {"id": 89, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态瓶里的植物不是越多越好，多到一定程度，既影响______，又会减小动物的活动空间，对生态系统也会 产生不良影响。", "answer": "植物对光的吸收"}, {"id": 90, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态瓶里的植物不是越多越好，多到一定程度，既影响植物对光的吸收，又会______，对生态系统也会 产生不良影响。", "answer": "减小动物的活动空间"}, {"id": 91, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "生态瓶里的植物不是越多越好，多到一定程度，既影响植物对光的吸收，又会减小动物的活动空间，对生态系统也会 产生______。", "answer": "不良影响"}, {"id": 92, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "______指同一时间生活在一定自然区域内，同种生物的所有个体【比如一群大象】", "answer": "种群"}, {"id": 93, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "种群指同一时间生活在一定自然区域内，______【比如一群大象】", "answer": "同种生物的所有个体"}, {"id": 94, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "______指相同时间聚集在同一区域或环境内各种生物种群的集合【比如绿豆苗+周围的蚜虫、瓢虫、蜘蛛等生物】", "answer": "群落"}, {"id": 95, "unit": "第一单元《生物与环境》", "lesson": "第 7 课时 设计和制作生态瓶", "question": "群落指相同时间聚集在同一区域或环境内______种群的集合【比如绿豆苗+周围的蚜虫、瓢虫、蜘蛛等生物】", "answer": "各种生物"}, {"id": 96, "unit": "第二单元 船的研究", "lesson": "第 1 课 船的历史", "question": "船的发展历程：______。", "answer": "独木舟-摇橹木船-帆船-蒸汽船-轮船-潜艇"}, {"id": 97, "unit": "第二单元 船的研究", "lesson": "第 1 课 船的历史", "question": "独木舟存在______，不稳定等缺点。我们可以采用增宽船体等方法使其保持稳定。", "answer": "装载量小"}, {"id": 98, "unit": "第二单元 船的研究", "lesson": "第 1 课 船的历史", "question": "独木舟存在装载量小，______等缺点。我们可以采用增宽船体等方法使其保持稳定。", "answer": "不稳定"}, {"id": 99, "unit": "第二单元 船的研究", "lesson": "第 1 课 船的历史", "question": "独木舟存在装载量小，不稳定等缺点。我们可以采用______等方法使其保持稳定。", "answer": "增宽船体"}, {"id": 100, "unit": "第二单元 船的研究", "lesson": "第 1 课 船的历史", "question": "船在水中行驶时，会受到______。船首采用流线型（尖形），可以减小船在行驶中的阻力。", "answer": "水的阻力"}, {"id": 101, "unit": "第二单元 船的研究", "lesson": "第 1 课 船的历史", "question": "船在水中行驶时，会受到水的阻力。船首采用______，可以减小船在行驶中的阻力。", "answer": "流线型（尖形）"}, {"id": 102, "unit": "第二单元 船的研究", "lesson": "第 1 课 船的历史", "question": "船在水中行驶时，会受到水的阻力。船首采用流线型（尖形），可以______船在行驶中的阻力。", "answer": "减小"}, {"id": 103, "unit": "第二单元 船的研究", "lesson": "第 1 课 船的历史", "question": "随着船的不断发展，______ 力】、功能方面都发生了变化", "answer": "船的材料【木制-钢铁】、构造、载重量【小-大】、安全系数、动力【人工-风力-蒸汽-内燃机-电"}, {"id": 104, "unit": "第二单元 船的研究", "lesson": "第 1 课 船的历史", "question": "随着船的不断发展，船的材料【木制-钢铁】、构造、载重量【小-大】、安全系数、动力【人工-风力-蒸汽-内燃机-电 ______方面都发生了变化", "answer": "力】、功能"}, {"id": 105, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "用螺母测试船的载重量，注意______螺母。为了防止侧翻，应将螺母均匀地摆放。", "answer": "不能让水浸湿"}, {"id": 106, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "用螺母测试船的载重量，注意不能让水浸湿螺母。为了防止侧翻，应将螺母______地摆放。", "answer": "均匀"}, {"id": 107, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "竹筏通过______，增加底面积，比独木舟更稳定、载重量更大。", "answer": "加大船体"}, {"id": 108, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "竹筏通过加大船体，______，比独木舟更稳定、载重量更大。", "answer": "增加底面积"}, {"id": 109, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "竹筏的不足之处：______。", "answer": "容易浸水、不牢固、载重量有限"}, {"id": 110, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "改进方法：用______、优化船体的尺度和线型，把船的体积做得更大、给船安装“橹”或“帆”。", "answer": "防水材料造船"}, {"id": 111, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "改进方法：用防水材料造船、优化船体的尺度和线型，把船的______、给船安装“橹”或“帆”。", "answer": "体积做得更大"}, {"id": 112, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "改进方法：用防水材料造船、优化船体的尺度和线型，把船的体积做得更大、给船______。", "answer": "安装“橹”或“帆”"}, {"id": 113, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "摇橹木船和明代宝船______的问题，而且出现了“摇橹”“风帆”等动力系统。", "answer": "解决了容易浸水"}, {"id": 114, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "摇橹木船和明代宝船解决了容易浸水的问题，而且出现了______等动力系统。", "answer": "“摇橹”“风帆”"}, {"id": 115, "unit": "第二单元 船的研究", "lesson": "第 2 课 用浮的材料造船", "question": "浮的材料，比如______可以制作船。", "answer": "竹子、木头"}, {"id": 116, "unit": "第二单元 船的研究", "lesson": "第 3 课 用沉的材料造船", "question": "有的材料在水中是浮的，有的材料在水中是沉的。沉的材料，比如______可以制作船。", "answer": "橡皮、铝箔纸、钢铁"}, {"id": 117, "unit": "第二单元 船的研究", "lesson": "第 3 课 用沉的材料造船", "question": "物体在水中会受到______托起的力，像这样的力是浮力。", "answer": "竖直向上"}, {"id": 118, "unit": "第二单元 船的研究", "lesson": "第 3 课 用沉的材料造船", "question": "物体在水中会受到竖直向上托起的力，像这样的力是______。", "answer": "浮力"}, {"id": 119, "unit": "第二单元 船的研究", "lesson": "第 3 课 用沉的材料造船", "question": "相同质量的橡皮泥和铝箔纸，把它们做成船型后，浸入水中的______，在水中受到的浮力增大，越容易浮在水面。", "answer": "体积增大"}, {"id": 120, "unit": "第二单元 船的研究", "lesson": "第 3 课 用沉的材料造船", "question": "相同质量的橡皮泥和铝箔纸，把它们做成船型后，浸入水中的体积增大，在水中受到的______，越容易浮在水面。", "answer": "浮力增大"}, {"id": 121, "unit": "第二单元 船的研究", "lesson": "第 3 课 用沉的材料造船", "question": "渡船的底部特别宽阔，可以提高船的______。双体船是一种带有两个平行船体的船，这样做的优点是提高船的稳定性。", "answer": "稳定性"}, {"id": 122, "unit": "第二单元 船的研究", "lesson": "第 3 课 用沉的材料造船", "question": "渡船的底部特别宽阔，可以______。双体船是一种带有两个平行船体的船，这样做的优点是提高船的稳定性。", "answer": "提高船的稳定性"}, {"id": 123, "unit": "第二单元 船的研究", "lesson": "第 3 课 用沉的材料造船", "question": "工程设计的过程：______。", "answer": "问题-设计-制作-测试-完善"}, {"id": 124, "unit": "第二单元 船的研究", "lesson": "第 4 课 增加船的载重量", "question": "船的载重量与______有关， 相同重量和相同大小的材料， 制作的船型体积越大， 船的载重量就越大。", "answer": "船只的体积"}, {"id": 125, "unit": "第二单元 船的研究", "lesson": "第 4 课 增加船的载重量", "question": "船的载重量与船只的体积有关， ______和相同大小的材料， 制作的船型体积越大， 船的载重量就越大。", "answer": "相同重量"}, {"id": 126, "unit": "第二单元 船的研究", "lesson": "第 4 课 增加船的载重量", "question": "船的载重量与船只的体积有关， 相同重量和______的材料， 制作的船型体积越大， 船的载重量就越大。", "answer": "相同大小"}, {"id": 127, "unit": "第二单元 船的研究", "lesson": "第 4 课 增加船的载重量", "question": "船的载重量与船只的体积有关， 相同重量和相同大小的材料， 制作的船型体积______， 船的载重量就越大。", "answer": "越大"}, {"id": 128, "unit": "第二单元 船的研究", "lesson": "第 4 课 增加船的载重量", "question": "船的载重量与船只的体积有关， 相同重量和相同大小的材料， 制作的船型体积______， 船的载重量就越大。", "answer": "越大"}, {"id": 129, "unit": "第二单元 船的研究", "lesson": "第 4 课 增加船的载重量", "question": "船舱中______有利于增加船的载重量。弹珠滚动容易导致船侧翻， 为了均匀放置货物，可以船舱分格来增加船的稳定性。", "answer": "合理放置重物"}, {"id": 130, "unit": "第二单元 船的研究", "lesson": "第 4 课 增加船的载重量", "question": "船舱中合理放置重物有利于增加船的载重量。弹珠滚动容易导致船侧翻， 为了均匀放置货物，可以______来增加船的稳定性。", "answer": "船舱分格"}, {"id": 131, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "船可以通过______来控制方向。", "answer": "船舵"}, {"id": 132, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "船可以通过船舵来______。", "answer": "控制方向"}, {"id": 133, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "可以利用______等作为船的动力。", "answer": "风力、蒸汽动力、机械动力"}, {"id": 134, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "船身设计成为______可以减少水的阻力。", "answer": "流线型"}, {"id": 135, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "潜艇常用的动力有______和核动力。", "answer": "柴油动力"}, {"id": 136, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "潜艇常用的动力有柴油动力和______。", "answer": "核动力"}, {"id": 137, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "可以通过______改变潜水艇的重力：进水，重力增加，潜水艇下沉；排水，重力减小，潜水艇上浮。", "answer": "进水、排水"}, {"id": 138, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "可以通过进水、排水改变潜水艇的______：进水，重力增加，潜水艇下沉；排水，重力减小，潜水艇上浮。", "answer": "重力"}, {"id": 139, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "可以通过______、排水改变潜水艇的重力：进水，重力增加，潜水艇下沉；排水，重力减小，潜水艇上浮。", "answer": "进水"}, {"id": 140, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "可以通过进水、排水改变潜水艇的重力：进水，重力增加，潜水艇______；排水，重力减小，潜水艇上浮。", "answer": "下沉"}, {"id": 141, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "可以通过进水、______改变潜水艇的重力：进水，重力增加，潜水艇下沉；排水，重力减小，潜水艇上浮。", "answer": "排水"}, {"id": 142, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "可以通过进水、排水改变潜水艇的重力：进水，重力增加，潜水艇下沉；排水，重力减小，潜水艇______。", "answer": "上浮"}, {"id": 143, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "设计我们的小船时需要考虑的因素：______。", "answer": "船的大小、船的形状、船体材料、载重量、稳固性、动力系统、材料成本"}, {"id": 144, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "制作时要按照______进行，工程设计一般会经历“问题－设计－制作－测试－评估改进”等过程。", "answer": "设计图"}, {"id": 145, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "制作时要按照设计图进行，工程设计一般会经历“______”等过程。", "answer": "问题－设计－制作－测试－评估改进"}, {"id": 146, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "在设计小船的活动中，要建立______和成本的意识。当造船费用一样时，比哪组性能更好；当船性能一样时，比哪组的 造船价格低。", "answer": "质量"}, {"id": 147, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "在设计小船的活动中，要建立质量和______的意识。当造船费用一样时，比哪组性能更好；当船性能一样时，比哪组的 造船价格低。", "answer": "成本"}, {"id": 148, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "在设计小船的活动中，要建立质量和成本的意识。当造船费用一样时，比哪组______更好；当船性能一样时，比哪组的 造船价格低。", "answer": "性能"}, {"id": 149, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "在设计小船的活动中，要建立质量和成本的意识。当造船费用一样时，比哪组性能更好；当船性能一样时，比哪组的 造船______。", "answer": "价格低"}, {"id": 150, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "设计图要标注______和结构，要考虑设计的合理性和可靠性以及成本。", "answer": "材料"}, {"id": 151, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "设计图要标注材料和______，要考虑设计的合理性和可靠性以及成本。", "answer": "结构"}, {"id": 152, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "设计图要标注材料和结构，要考虑设计的______和可靠性以及成本。", "answer": "合理性"}, {"id": 153, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "设计图要标注材料和结构，要考虑设计的合理性和______以及成本。", "answer": "可靠性"}, {"id": 154, "unit": "第二单元 船的研究", "lesson": "第 5 课 给船装上动力", "question": "设计图要标注材料和结构，要考虑设计的合理性和可靠性以及______。", "answer": "成本"}, {"id": 155, "unit": "第三单元 环境与我们", "lesson": "第 1 课 地球－宇宙的奇迹", "question": "有______、有大气层", "answer": "液态的水"}, {"id": 156, "unit": "第三单元 环境与我们", "lesson": "第 1 课 地球－宇宙的奇迹", "question": "有液态的水、有______", "answer": "大气层"}, {"id": 157, "unit": "第三单元 环境与我们", "lesson": "第 1 课 地球－宇宙的奇迹", "question": "大气中______于二氧化碳等气体", "answer": "氧气的含量高"}, {"id": 158, "unit": "第三单元 环境与我们", "lesson": "第 1 课 地球－宇宙的奇迹", "question": "有完整的______可抵御紫外线的伤害", "answer": "臭氧层"}, {"id": 159, "unit": "第三单元 环境与我们", "lesson": "第 1 课 地球－宇宙的奇迹", "question": "有完整的臭氧层可______的伤害", "answer": "抵御紫外线"}, {"id": 160, "unit": "第三单元 环境与我们", "lesson": "第 1 课 地球－宇宙的奇迹", "question": "与各______，引力适宜", "answer": "星球距离适中"}, {"id": 161, "unit": "第三单元 环境与我们", "lesson": "第 1 课 地球－宇宙的奇迹", "question": "与各星球距离适中，______", "answer": "引力适宜"}, {"id": 162, "unit": "第三单元 环境与我们", "lesson": "第 1 课 地球－宇宙的奇迹", "question": "地表温度______ ，温度适宜", "answer": "昼夜温差不大"}, {"id": 163, "unit": "第三单元 环境与我们", "lesson": "第 1 课 地球－宇宙的奇迹", "question": "有______，使雨水能够积蓄在地球表面", "answer": "岩石和土壤"}, {"id": 164, "unit": "第三单元 环境与我们", "lesson": "第 1 课 地球－宇宙的奇迹", "question": "有岩石和土壤，使______在地球表面", "answer": "雨水能够积蓄"}, {"id": 165, "unit": "第三单元 环境与我们", "lesson": "第 1 课 地球－宇宙的奇迹", "question": "火星大气基本不含氧气，气候会短期内______，不能提供生命必要条件。火星大气中也基本没有氧气。", "answer": "反复地剧烈变动"}, {"id": 166, "unit": "第三单元 环境与我们", "lesson": "第 1 课 地球－宇宙的奇迹", "question": "八大行星中唯有地球的大气中有______，地球距离太阳不远不近，保证地球上有液态水。", "answer": "大量的氧气"}, {"id": 167, "unit": "第三单元 环境与我们", "lesson": "第 1 课 地球－宇宙的奇迹", "question": "八大行星中唯有地球的大气中有大量的氧气，地球距离太阳______，保证地球上有液态水。", "answer": "不远不近"}, {"id": 168, "unit": "第三单元 环境与我们", "lesson": "第 1 课 地球－宇宙的奇迹", "question": "八大行星中唯有地球的大气中有大量的氧气，地球距离太阳不远不近，保证地球上有______。", "answer": "液态水"}, {"id": 169, "unit": "第三单元 环境与我们", "lesson": "第 1 课 地球－宇宙的奇迹", "question": "海洋为人类生存提供了______等多种资源。", "answer": "生物、矿产、能源、空间"}, {"id": 170, "unit": "第三单元 环境与我们", "lesson": "第 1 课 地球－宇宙的奇迹", "question": "海洋生物对维持海洋生态系统起着重要作用，同时也是大气中______之一。 5.设计空间站：考虑温度、呼吸、饮食、避免过度辐射、重力等条件", "answer": "二氧化碳的主要吸收者"}, {"id": 171, "unit": "第三单元 环境与我们", "lesson": "第 1 课 地球－宇宙的奇迹", "question": "海洋生物对维持海洋生态系统起着重要作用，同时也是大气中二氧化碳的主要吸收者之一。 5.设计空间站：考虑______等条件", "answer": "温度、呼吸、饮食、避免过度辐射、重力"}, {"id": 172, "unit": "第三单元 环境与我们", "lesson": "第 2 课 我们面临的环境问题", "question": "有些环境问题是由______引发的。地球面临着多种环境问题，包括：大气污染、水资源短缺、水污染、固体废弃物 污染、全球变暖、光污染、噪声污染等。", "answer": "人类活动"}, {"id": 173, "unit": "第三单元 环境与我们", "lesson": "第 2 课 我们面临的环境问题", "question": "有些环境问题是由人类活动引发的。地球面临着多种环境问题，包括：______ 污染、全球变暖、光污染、噪声污染等。", "answer": "大气污染、水资源短缺、水污染、固体废弃物"}, {"id": 174, "unit": "第三单元 环境与我们", "lesson": "第 2 课 我们面临的环境问题", "question": "有些环境问题是由人类活动引发的。地球面临着多种环境问题，包括：大气污染、水资源短缺、水污染、固体废弃物 ______等。", "answer": "污染、全球变暖、光污染、噪声污染"}, {"id": 175, "unit": "第三单元 环境与我们", "lesson": "第 2 课 我们面临的环境问题", "question": "______和赤潮会促使藻类大量繁殖，遮挡阳光，导致水下植物无法进行光合作用，氧气缺乏，从而导致大量水 生生物死亡。", "answer": "水体富营养化"}, {"id": 176, "unit": "第三单元 环境与我们", "lesson": "第 2 课 我们面临的环境问题", "question": "水体富营养化和______会促使藻类大量繁殖，遮挡阳光，导致水下植物无法进行光合作用，氧气缺乏，从而导致大量水 生生物死亡。", "answer": "赤潮"}, {"id": 177, "unit": "第三单元 环境与我们", "lesson": "第 2 课 我们面临的环境问题", "question": "水体富营养化和赤潮会促使______，遮挡阳光，导致水下植物无法进行光合作用，氧气缺乏，从而导致大量水 生生物死亡。", "answer": "藻类大量繁殖"}, {"id": 178, "unit": "第三单元 环境与我们", "lesson": "第 2 课 我们面临的环境问题", "question": "水体富营养化和赤潮会促使藻类大量繁殖，______，导致水下植物无法进行光合作用，氧气缺乏，从而导致大量水 生生物死亡。", "answer": "遮挡阳光"}, {"id": 179, "unit": "第三单元 环境与我们", "lesson": "第 2 课 我们面临的环境问题", "question": "水体富营养化和赤潮会促使藻类大量繁殖，遮挡阳光，导致水下植物无法进行光合作用，______，从而导致大量水 生生物死亡。", "answer": "氧气缺乏"}, {"id": 180, "unit": "第三单元 环境与我们", "lesson": "第 2 课 我们面临的环境问题", "question": "水体富营养化和赤潮会促使藻类大量繁殖，遮挡阳光，导致水下植物无法进行光合作用，氧气缺乏，从而导致大量水 ______。", "answer": "生生物死亡"}, {"id": 181, "unit": "第三单元 环境与我们", "lesson": "第 3 课 珍惜水资源", "question": "地球上可供利用的______，其中有 69.7%是人类难以利用的山区、两极地区的冰与永久积雪", "answer": "淡水资源总量少且短缺"}, {"id": 182, "unit": "第三单元 环境与我们", "lesson": "第 3 课 珍惜水资源", "question": "我国______，且分布很不均匀", "answer": "人均水资源占有量更少"}, {"id": 183, "unit": "第三单元 环境与我们", "lesson": "第 3 课 珍惜水资源", "question": "我国人均水资源占有量更少，且______", "answer": "分布很不均匀"}, {"id": 184, "unit": "第三单元 环境与我们", "lesson": "第 3 课 珍惜水资源", "question": "______、水资源的浪费2、主要节水措施：", "answer": "水污染严重"}, {"id": 185, "unit": "第三单元 环境与我们", "lesson": "第 3 课 珍惜水资源", "question": "水污染严重、______2、主要节水措施：", "answer": "水资源的浪费"}, {"id": 186, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "1.垃圾来源 ：______", "answer": "城市生活垃圾、工业垃圾、农业垃圾"}, {"id": 187, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "2、生活垃圾四大类：【垃圾分类有利于______】", "answer": "资源回收和后续处理"}, {"id": 188, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "______：纸制品、金属制品、塑料制品、玻璃制品", "answer": "可回收垃圾"}, {"id": 189, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "______：剩菜剩饭、骨头、树叶", "answer": "厨余垃圾"}, {"id": 190, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "______：过期药品、废电池、水银温度计、废灯管", "answer": "有害垃圾"}, {"id": 191, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "3、解决垃圾问题的方法：______（避免产生额外垃圾）、资源化（将回收的垃圾再利用）、无害化", "answer": "减量化"}, {"id": 192, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "3、解决垃圾问题的方法：减量化（避免产生额外垃圾）、______（将回收的垃圾再利用）、无害化", "answer": "资源化"}, {"id": 193, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "3、解决垃圾问题的方法：减量化（避免产生额外垃圾）、资源化（将回收的垃圾再利用）、______", "answer": "无害化"}, {"id": 194, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "4、无害化处理：______（利用微生物，将生活垃圾中有机质分解、腐熟转化为养分和腐殖质）。", "answer": "填埋法、焚烧法、堆肥法"}, {"id": 195, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "5、生活中减少垃圾的方法：______", "answer": "减少食物浪费、少买不必要的衣服、用布袋取代塑料袋、减少一次性餐具的使用。"}, {"id": 196, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "我国的电能主要有______", "answer": "水电、太阳能发电、风电、核电和火电（煤燃烧发出的电）。目前火电所占的比例最大。"}, {"id": 197, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "______：人类过度消耗化石能源增加的二氧化碳，使地表附近的大气温度上升，被称作温室效应。", "answer": "温室效应"}, {"id": 198, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "温室效应：人类过度消耗______增加的二氧化碳，使地表附近的大气温度上升，被称作温室效应。", "answer": "化石能源"}, {"id": 199, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "温室效应：人类过度消耗化石能源增加的______，使地表附近的大气温度上升，被称作温室效应。", "answer": "二氧化碳"}, {"id": 200, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "温室效应：人类过度消耗化石能源增加的二氧化碳，使地表附近的大气______，被称作温室效应。", "answer": "温度上升"}, {"id": 201, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "能源问题是人类对______和现有能源资源日趋减少的矛盾，还包括化石能源在使用过程中对环境的污染问题。", "answer": "能源需求的增长"}, {"id": 202, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "能源问题是人类对能源需求的增长和______的矛盾，还包括化石能源在使用过程中对环境的污染问题。", "answer": "现有能源资源日趋减少"}, {"id": 203, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "能源问题是人类对能源需求的增长和现有能源资源日趋减少的矛盾，还包括化石能源在使用过程中______。", "answer": "对环境的污染问题"}, {"id": 204, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "解决能源问题的方法：______。", "answer": "节约用电、节约燃料、开发新能源、提高能源转换率"}, {"id": 205, "unit": "第三单元 环境与我们", "lesson": "第 4 课 解决垃圾问题", "question": "可再生能源：______等非化石能源形式", "answer": "太阳能、风能、地热能、海洋能"}, {"id": 206, "unit": "第四单元 热", "lesson": "第 1 课 温度与水的变化", "question": "不可再生能源：______", "answer": "煤、石油、天然气"}, {"id": 207, "unit": "第四单元 热", "lesson": "第 1 课 温度与水的变化", "question": "温室效应的模拟实验中，密封袋______。", "answer": "模拟温室气体"}, {"id": 208, "unit": "第四单元 热", "lesson": "第 1 课 温度与水的变化", "question": "物质通常以______的形态存在，物态变化取决于温度等。", "answer": "固态、液态、气态"}, {"id": 209, "unit": "第四单元 热", "lesson": "第 1 课 温度与水的变化", "question": "物质通常以固态、液态、气态的形态存在，物态变化取决于______等。", "answer": "温度"}, {"id": 210, "unit": "第四单元 热", "lesson": "第 1 课 温度与水的变化", "question": "热是能量的一种表现形式，______导致了物体温度变化。水沸腾需要吸热，水结冰需要释放热量。", "answer": "热量变化"}, {"id": 211, "unit": "第四单元 热", "lesson": "第 1 课 温度与水的变化", "question": "热是能量的一种表现形式，热量变化导致了物体______。水沸腾需要吸热，水结冰需要释放热量。", "answer": "温度变化"}, {"id": 212, "unit": "第四单元 热", "lesson": "第 1 课 温度与水的变化", "question": "热是能量的一种表现形式，热量变化导致了物体温度变化。______需要吸热，水结冰需要释放热量。", "answer": "水沸腾"}, {"id": 213, "unit": "第四单元 热", "lesson": "第 1 课 温度与水的变化", "question": "热是能量的一种表现形式，热量变化导致了物体温度变化。水沸腾需要______，水结冰需要释放热量。", "answer": "吸热"}, {"id": 214, "unit": "第四单元 热", "lesson": "第 1 课 温度与水的变化", "question": "热是能量的一种表现形式，热量变化导致了物体温度变化。水沸腾需要吸热，水______需要释放热量。", "answer": "结冰"}, {"id": 215, "unit": "第四单元 热", "lesson": "第 1 课 温度与水的变化", "question": "热是能量的一种表现形式，热量变化导致了物体温度变化。水沸腾需要吸热，水结冰需要______。", "answer": "释放热量"}, {"id": 216, "unit": "第四单元 热", "lesson": "第 6 课 让资源再生", "question": "地球上的有些资源被消耗就______，如煤、石油、天然气等。有些资源是可再生的，如塑料、玻璃、金属、织物和 纸。纸的再生利用有利于节约资源，节约能源，减少污染。", "answer": "不可再生"}, {"id": 217, "unit": "第四单元 热", "lesson": "第 6 课 让资源再生", "question": "地球上的有些资源被消耗就不可再生，如煤、石油、天然气等。有些资源是______，如塑料、玻璃、金属、织物和 纸。纸的再生利用有利于节约资源，节约能源，减少污染。", "answer": "可再生的"}, {"id": 218, "unit": "第四单元 热", "lesson": "第 6 课 让资源再生", "question": "地球上的有些资源被消耗就不可再生，如煤、石油、天然气等。有些资源是可再生的，如______、玻璃、金属、织物和 纸。纸的再生利用有利于节约资源，节约能源，减少污染。", "answer": "塑料"}, {"id": 219, "unit": "第四单元 热", "lesson": "第 6 课 让资源再生", "question": "地球上的有些资源被消耗就不可再生，如煤、石油、天然气等。有些资源是可再生的，如塑料、______、金属、织物和 纸。纸的再生利用有利于节约资源，节约能源，减少污染。", "answer": "玻璃"}, {"id": 220, "unit": "第四单元 热", "lesson": "第 6 课 让资源再生", "question": "地球上的有些资源被消耗就不可再生，如煤、石油、天然气等。有些资源是可再生的，如塑料、玻璃、______、织物和 纸。纸的再生利用有利于节约资源，节约能源，减少污染。", "answer": "金属"}, {"id": 221, "unit": "第四单元 热", "lesson": "第 6 课 让资源再生", "question": "地球上的有些资源被消耗就不可再生，如煤、石油、天然气等。有些资源是可再生的，如塑料、玻璃、金属、______和 纸。纸的再生利用有利于节约资源，节约能源，减少污染。", "answer": "织物"}, {"id": 222, "unit": "第四单元 热", "lesson": "第 6 课 让资源再生", "question": "地球上的有些资源被消耗就不可再生，如煤、石油、天然气等。有些资源是可再生的，如塑料、玻璃、金属、织物和 纸。纸的再生利用有利于______。", "answer": "节约资源，节约能源，减少污染"}, {"id": 223, "unit": "第四单元 热", "lesson": "第 6 课 让资源再生", "question": "一张再生纸的制作过程：______", "answer": "撕碎→搅拌→平铺→挤压吸水→通风晾干"}, {"id": 224, "unit": "第四单元 热", "lesson": "第 6 课 让资源再生", "question": "______：指人们生产和消费过程中产生的废物作为资源加以回收利用，使一些废弃物变废为宝。", "answer": "资源再生"}, {"id": 225, "unit": "第四单元 热", "lesson": "第 6 课 让资源再生", "question": "东汉______改进了造纸术。", "answer": "蔡伦"}, {"id": 226, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "环境问题是很复杂的，依据人们居住的地域和所从事工作的不同，在看待某个污染问题时，人们会持有______。", "answer": "不同的态度"}, {"id": 227, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "为了达成可行的解决办法，需要学会______。既要从“自身角色”角度提出方案，也要换位思考。人们的行为可 能破坏环境，也能够通过努力改善环境。", "answer": "协调和放弃"}, {"id": 228, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "为了达成可行的解决办法，需要学会协调和放弃。既要从“自身角色”角度提出方案，也要______。人们的行为可 能破坏环境，也能够通过努力改善环境。", "answer": "换位思考"}, {"id": 229, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "为了达成可行的解决办法，需要学会协调和放弃。既要从“自身角色”角度提出方案，也要换位思考。人们的行为可 能______，也能够通过努力改善环境。", "answer": "破坏环境"}, {"id": 230, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "为了达成可行的解决办法，需要学会协调和放弃。既要从“自身角色”角度提出方案，也要换位思考。人们的行为可 能破坏环境，也能够通过努力______。", "answer": "改善环境"}, {"id": 231, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "加热过程，水吸热温度上升直至温度______ 100℃沸腾，继续加热，温度保持在 100℃。停止加热，水温度会下降，因为无热量供给。", "answer": "达到"}, {"id": 232, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "加热过程，水吸热温度上升直至温度达到 ______，继续加热，温度保持在 100℃。停止加热，水温度会下降，因为无热量供给。", "answer": "100℃沸腾"}, {"id": 233, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "加热过程，水吸热温度上升直至温度达到 100℃沸腾，继续加热，温度______ 100℃。停止加热，水温度会下降，因为无热量供给。", "answer": "保持在"}, {"id": 234, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "加热过程，水吸热温度上升直至温度达到 ______沸腾，继续加热，温度保持在 100℃。停止加热，水温度会下降，因为无热量供给。", "answer": "100℃"}, {"id": 235, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "加热过程，水吸热温度上升直至温度达到 100℃沸腾，继续加热，温度保持在 100℃。停止加热，水温度会下降，因为______。", "answer": "无热量供给"}, {"id": 236, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "水沸腾时的温度，叫水的______，标准大气压下，水的沸点是 100℃。", "answer": "沸点"}, {"id": 237, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "水沸腾时的温度，叫水的沸点，______下，水的沸点是 100℃。", "answer": "标准大气压"}, {"id": 238, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "水沸腾时的温度，叫水的沸点，标准大气压下，水的沸点是 ______。", "answer": "100℃"}, {"id": 239, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "沸腾时______。", "answer": "剧烈冒气泡、有水蒸气产生"}, {"id": 240, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "水结冰时，温度不断下降直至达到 ______，处于冰水混合状态。完全结冰后，温度下降到 0℃以下。", "answer": "0℃时开始结冰"}, {"id": 241, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "水结冰时，温度不断下降直至达到 0℃时开始结冰，处于______。完全结冰后，温度下降到 0℃以下。", "answer": "冰水混合状态"}, {"id": 242, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "水结冰时，温度不断下降直至达到 0℃时开始结冰，处于冰水混合状态。______后，温度下降到 0℃以下。", "answer": "完全结冰"}, {"id": 243, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "水结冰时，温度不断下降直至达到 0℃时开始结冰，处于冰水混合状态。完全结冰后，______到 0℃以下。", "answer": "温度下降"}, {"id": 244, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "水结冰时的温度，叫水的凝固点，______下，水的凝固点是 0℃。水从液态变成固态，称为凝固。", "answer": "标准大气压"}, {"id": 245, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "水结冰时的温度，叫水的凝固点，标准大气压下，水的______ 0℃。水从液态变成固态，称为凝固。", "answer": "凝固点是"}, {"id": 246, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "水结冰时的温度，叫水的凝固点，标准大气压下，水的凝固点是 ______。水从液态变成固态，称为凝固。", "answer": "0℃"}, {"id": 247, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "水结冰时的温度，叫水的凝固点，标准大气压下，水的凝固点是 0℃。水从______，称为凝固。", "answer": "液态变成固态"}, {"id": 248, "unit": "第四单元 热", "lesson": "第 7 课 分析一个实际的环境问题", "question": "水结冰时的温度，叫水的______点，标准大气压下，水的凝固点是 0℃。水从液态变成固态，称为凝固。", "answer": "凝固"}, {"id": 249, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "水的蒸发过程______，水温越高，水蒸发越快。", "answer": "吸收热量"}, {"id": 250, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "水的蒸发过程吸收热量，______，水蒸发越快。", "answer": "水温越高"}, {"id": 251, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "水蒸气凝结成水的过程______。温度越低，凝结越快。", "answer": "放出热量"}, {"id": 252, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "凝结现象：洗澡后镜子出现水雾、做饭时锅盖上的水珠、饮料从冰箱拿出后表面出现水珠等。 4.水蒸气肉眼看不见，所以水沸腾时看到的“白气 ”不是水蒸气，而是______。", "answer": "水蒸气凝结的小水滴"}, {"id": 253, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "盐可以______，加速降温，烧杯外壁的水珠变多【装有冰的烧杯外壁有水珠是因为空气中的水蒸气遇冷的烧杯", "answer": "加速冰的融化"}, {"id": 254, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "盐可以加速冰的融化，加速降温，烧杯______变多【装有冰的烧杯外壁有水珠是因为空气中的水蒸气遇冷的烧杯", "answer": "外壁的水珠"}, {"id": 255, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "盐可以加速冰的融化，加速降温，烧杯外壁的水珠变多【装有冰的烧杯外壁有水珠是因为______的烧杯", "answer": "空气中的水蒸气遇冷"}, {"id": 256, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "自然界中水的形态多种多样，常见的有______等，他们的形成都与水蒸气的凝结有关。", "answer": "云、雾、雨、露、霜、雪"}, {"id": 257, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "自然界中水的形态多种多样，常见的有云、雾、雨、露、霜、雪等，他们的形成都与水蒸气的______有关。", "answer": "凝结"}, {"id": 258, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "云：水蒸气在高空中______或凝华成小冰晶便形成了云。", "answer": "遇冷凝结成小水珠"}, {"id": 259, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "云：水蒸气在高空中遇冷凝结成小水珠或______便形成了云。", "answer": "凝华成小冰晶"}, {"id": 260, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "雾：水蒸气______并附着在空气中的浮尘上便形成了雾。", "answer": "遇冷凝结成小水珠"}, {"id": 261, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "露：水蒸气遇到温度较低的叶子、花草等,______并附着在它们表面,便形成了露。", "answer": "凝结成小水珠"}, {"id": 262, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "霜：地面附近的水蒸气遇到冷的物体(温度在 0℃以下)，______,便形成了霜。", "answer": "凝华成固态的小冰晶"}, {"id": 263, "unit": "第四单元 热", "lesson": "第 2 课 水的蒸发和凝结", "question": "雪：水蒸气在空中______,小冰晶汇聚到一起形成雪降落下来。", "answer": "遇冷凝华成小冰晶"}, {"id": 264, "unit": "第四单元 热", "lesson": "第 3 课 温度不同的物体相互接触", "question": "刚从冰箱里取出的牛奶，要使它变成热的，我们会把它浸在热水中。热会从热水转移到牛奶。 实验结论：______", "answer": "热通常从温度高的物体传向温度低的物体。"}, {"id": 265, "unit": "第四单元 热", "lesson": "第 3 课 温度不同的物体相互接触", "question": "热水跟冷水接触，最终二者温度相同，然后跟空气进行热量传递，一起______。 实验结论：两个温度不同的物体相互接触，最终温度相同，达到热平衡。", "answer": "下降到室温"}, {"id": 266, "unit": "第四单元 热", "lesson": "第 3 课 温度不同的物体相互接触", "question": "热水跟冷水接触，最终二者______，然后跟空气进行热量传递，一起下降到室温。 实验结论：两个温度不同的物体相互接触，最终温度相同，达到热平衡。", "answer": "温度相同"}, {"id": 267, "unit": "第四单元 热", "lesson": "第 3 课 温度不同的物体相互接触", "question": "热水跟冷水接触，最终二者温度相同，然后跟空气进行热量传递，一起下降到室温。 实验结论：两个温度不同的物体相互接触，最终温度相同，达到______。", "answer": "热平衡"}, {"id": 268, "unit": "第四单元 热", "lesson": "第 3 课 温度不同的物体相互接触", "question": "在实验中，我们测量物体的温度通常使用______，生活中还有更多可以感知温度的方法，比如使用热成像仪、感温纸 带、感温粉末。", "answer": "温度计"}, {"id": 269, "unit": "第四单元 热", "lesson": "第 3 课 温度不同的物体相互接触", "question": "在实验中，我们测量物体的温度通常使用温度计，生活中还有更多可以感知温度的方法，比如使用______ 带、感温粉末。", "answer": "热成像仪、感温纸"}, {"id": 270, "unit": "第四单元 热", "lesson": "第 3 课 温度不同的物体相互接触", "question": "在实验中，我们测量物体的温度通常使用温度计，生活中还有更多可以感知温度的方法，比如使用热成像仪、感温纸 ______", "answer": "带、感温粉末。"}, {"id": 271, "unit": "第四单元 热", "lesson": "第 4 课 热在金属中的传递", "question": "热传递有一定的方向性，热总是______，或从一个高温物体传递给一个低温物体。热 传递的方向与物体的体积、质量等无关。", "answer": "从温度较高的一端传向温度较低的一端"}, {"id": 272, "unit": "第四单元 热", "lesson": "第 4 课 热在金属中的传递", "question": "热传递有一定的方向性，热总是从温度较高的一端传向温度较低的一端，或从一个高温物体传递给一个低温物体。热 ______", "answer": "传递的方向与物体的体积、质量等无关。"}, {"id": 273, "unit": "第四单元 热", "lesson": "第 4 课 热在金属中的传递", "question": "热传递有______三种传递方式。", "answer": "热传导、热对流、热辐射"}, {"id": 274, "unit": "第四单元 热", "lesson": "第 4 课 热在金属中的传递", "question": "(1)热传导：通过______，是固体热传递的主要方式。 (2)热对流：靠气体和液体的流动来传热的方式。", "answer": "直接接触传热"}, {"id": 275, "unit": "第四单元 热", "lesson": "第 4 课 热在金属中的传递", "question": "(1)热传导：通过直接接触传热，是______。 (2)热对流：靠气体和液体的流动来传热的方式。", "answer": "固体热传递的主要方式"}, {"id": 276, "unit": "第四单元 热", "lesson": "第 4 课 热在金属中的传递", "question": "(1)热传导：通过直接接触传热，是固体热传递的主要方式。 (2)热对流：靠______来传热的方式。", "answer": "气体和液体的流动"}, {"id": 277, "unit": "第四单元 热", "lesson": "第 4 课 热在金属中的传递", "question": "(3)热辐射：物体以______的形式向外发射热能的过程。太阳的热量以热辐射的形式传递到地球。 3.用火加热金属条的中部，金属条上的蜡从中部受热部分开始熔化，然后向两端依次熔化。", "answer": "电磁波"}, {"id": 278, "unit": "第四单元 热", "lesson": "第 4 课 热在金属中的传递", "question": "(3)热辐射：物体以电磁波的形式向外发射热能的过程。______以热辐射的形式传递到地球。 3.用火加热金属条的中部，金属条上的蜡从中部受热部分开始熔化，然后向两端依次熔化。", "answer": "太阳的热量"}, {"id": 279, "unit": "第四单元 热", "lesson": "第 4 课 热在金属中的传递", "question": "(3)______：物体以电磁波的形式向外发射热能的过程。太阳的热量以热辐射的形式传递到地球。 3.用火加热金属条的中部，金属条上的蜡从中部受热部分开始熔化，然后向两端依次熔化。", "answer": "热辐射"}, {"id": 280, "unit": "第四单元 热", "lesson": "第 4 课 热在金属中的传递", "question": "(3)热辐射：物体以电磁波的形式向外发射热能的过程。太阳的热量以热辐射的形式传递到地球。 3.用火加热金属条的中部，金属条上的蜡从中部受热部分开始熔化，然后______。", "answer": "向两端依次熔化"}, {"id": 281, "unit": "第四单元 热", "lesson": "第 4 课 热在金属中的传递", "question": "4.热在金属片中的传递：从加热点（热源中心）向______。", "answer": "四周各个方向逐渐传递"}, {"id": 282, "unit": "第四单元 热", "lesson": "第 5 课 热在水中的传递", "question": "热在______中的主要传递方式是热对流。", "answer": "液体和气体"}, {"id": 283, "unit": "第四单元 热", "lesson": "第 5 课 热在水中的传递", "question": "热在液体和气体中的主要传递方式是______。", "answer": "热对流"}, {"id": 284, "unit": "第四单元 热", "lesson": "第 5 课 热在水中的传递", "question": "加热试管中的水：滴加红墨水的目的是______，加热后的热水向上流动，冷水向下流动，形成对流。使整 杯水的温度趋于相同。", "answer": "方便观察水的流动"}, {"id": 285, "unit": "第四单元 热", "lesson": "第 5 课 热在水中的传递", "question": "加热试管中的水：滴加红墨水的目的是方便观察水的流动，加热后的______，冷水向下流动，形成对流。使整 杯水的温度趋于相同。", "answer": "热水向上流动"}, {"id": 286, "unit": "第四单元 热", "lesson": "第 5 课 热在水中的传递", "question": "加热试管中的水：滴加红墨水的目的是方便观察水的流动，加热后的热水向上流动，______，形成对流。使整 杯水的温度趋于相同。", "answer": "冷水向下流动"}, {"id": 287, "unit": "第四单元 热", "lesson": "第 5 课 热在水中的传递", "question": "加热试管中的水：滴加红墨水的目的是方便观察水的流动，加热后的热水向上流动，冷水向下流动，形成______。使整 杯水的温度趋于相同。", "answer": "对流"}, {"id": 288, "unit": "第四单元 热", "lesson": "第 5 课 热在水中的传递", "question": "加热试管中的水：滴加红墨水的目的是方便观察水的流动，加热后的热水向上流动，冷水向下流动，形成对流。使整 杯水的______。", "answer": "温度趋于相同"}, {"id": 289, "unit": "第四单元 热", "lesson": "第 5 课 热在水中的传递", "question": "热可以在______传递，固体、气体、液体都可以传递热。", "answer": "物体间和物体内"}, {"id": 290, "unit": "第四单元 热", "lesson": "第 5 课 热在水中的传递", "question": "热可以在物体间和物体内传递，______都可以传递热。", "answer": "固体、气体、液体"}, {"id": 291, "unit": "第四单元 热", "lesson": "第 5 课 热在水中的传递", "question": "______，热水/热空气上升。所以，空调安装在房间上方，因为冷空气下降，向下流动。", "answer": "冷水/冷空气下降"}, {"id": 292, "unit": "第四单元 热", "lesson": "第 5 课 热在水中的传递", "question": "冷水/冷空气下降，______。所以，空调安装在房间上方，因为冷空气下降，向下流动。", "answer": "热水/热空气上升"}, {"id": 293, "unit": "第四单元 热", "lesson": "第 5 课 热在水中的传递", "question": "冷水/冷空气下降，热水/热空气上升。所以，______安装在房间上方，因为冷空气下降，向下流动。", "answer": "空调"}, {"id": 294, "unit": "第四单元 热", "lesson": "第 5 课 热在水中的传递", "question": "冷水/冷空气下降，热水/热空气上升。所以，空调安装在房间______，因为冷空气下降，向下流动。", "answer": "上方"}, {"id": 295, "unit": "第四单元 热", "lesson": "第 5 课 热在水中的传递", "question": "冷水/______，热水/热空气上升。所以，空调安装在房间上方，因为冷空气下降，向下流动。", "answer": "冷空气下降"}, {"id": 296, "unit": "第四单元 热", "lesson": "第 5 课 热在水中的传递", "question": "______安装在房间下方，因为热空气上升，向上流动。", "answer": "暖气"}, {"id": 297, "unit": "第四单元 热", "lesson": "第 5 课 热在水中的传递", "question": "暖气安装在房间______，因为热空气上升，向上流动。", "answer": "下方"}, {"id": 298, "unit": "第四单元 热", "lesson": "第 5 课 热在水中的传递", "question": "暖气安装在房间下方，因为______，向上流动。", "answer": "热空气上升"}, {"id": 299, "unit": "第四单元 热", "lesson": "第 6 课 哪个传热快", "question": "不同材料制成的物体，______是不一样的。", "answer": "导热性能"}, {"id": 300, "unit": "第四单元 热", "lesson": "第 6 课 哪个传热快", "question": "热的良导体有______等金属材料。热的不良导体有塑料、木头、陶瓷、空气等材料。", "answer": "铜、铝、铁"}, {"id": 301, "unit": "第四单元 热", "lesson": "第 6 课 哪个传热快", "question": "热的良导体有铜、铝、铁等金属材料。热的不良导体有______等材料。", "answer": "塑料、木头、陶瓷、空气"}, {"id": 302, "unit": "第四单元 热", "lesson": "第 6 课 哪个传热快", "question": "比较木勺、塑料勺、金属勺哪个传热快：三种勺子中，______，塑料勺传热慢一些，木勺传热最慢。", "answer": "金属勺传热最快"}, {"id": 303, "unit": "第四单元 热", "lesson": "第 6 课 哪个传热快", "question": "比较木勺、塑料勺、金属勺哪个传热快：三种勺子中，金属勺传热最快，塑料勺传热慢一些，______。", "answer": "木勺传热最慢"}, {"id": 304, "unit": "第四单元 热", "lesson": "第 6 课 哪个传热快", "question": "铜、铝、铁三种材料的导热性能排序：______。", "answer": "铜＞铝＞铁"}, {"id": 305, "unit": "第四单元 热", "lesson": "第 6 课 哪个传热快", "question": "______需要用热的良导体，因为传热性能好；锅柄需要用热的不良导体，因为传热性能差，防止烫伤。", "answer": "锅身"}, {"id": 306, "unit": "第四单元 热", "lesson": "第 6 课 哪个传热快", "question": "锅身需要用______，因为传热性能好；锅柄需要用热的不良导体，因为传热性能差，防止烫伤。", "answer": "热的良导体"}, {"id": 307, "unit": "第四单元 热", "lesson": "第 6 课 哪个传热快", "question": "锅身需要用热的良导体，因为______；锅柄需要用热的不良导体，因为传热性能差，防止烫伤。", "answer": "传热性能好"}, {"id": 308, "unit": "第四单元 热", "lesson": "第 6 课 哪个传热快", "question": "锅身需要用热的良导体，因为传热性能好；______需要用热的不良导体，因为传热性能差，防止烫伤。", "answer": "锅柄"}, {"id": 309, "unit": "第四单元 热", "lesson": "第 6 课 哪个传热快", "question": "锅身需要用热的良导体，因为传热性能好；锅柄需要用______，因为传热性能差，防止烫伤。", "answer": "热的不良导体"}, {"id": 310, "unit": "第四单元 热", "lesson": "第 6 课 哪个传热快", "question": "锅身需要用热的良导体，因为传热性能好；锅柄需要用热的不良导体，因为______，防止烫伤。", "answer": "传热性能差"}, {"id": 311, "unit": "第四单元 热", "lesson": "第 7 课 做个保温杯", "question": "______制作保温杯时，应选择热的不良导体。 传热性能越差， 隔绝内部与外界接触，保温效果越好。", "answer": "热的良导体散热快，热的不良导体散热慢。"}, {"id": 312, "unit": "第四单元 热", "lesson": "第 7 课 做个保温杯", "question": "热的良导体散热快，热的______散热慢。制作保温杯时，应选择热的不良导体。 传热性能越差， 隔绝内部与外界接触，保温效果越好。", "answer": "不良导体"}, {"id": 313, "unit": "第四单元 热", "lesson": "第 7 课 做个保温杯", "question": "热的良导体散热快，热的不良导体散热慢。制作保温杯时，应选择热的不良导体。 传热性能______， 隔绝内部与外界接触，保温效果越好。", "answer": "越差"}, {"id": 314, "unit": "第四单元 热", "lesson": "第 7 课 做个保温杯", "question": "热的良导体散热快，热的不良导体散热慢。制作保温杯时，应选择热的不良导体。 传热性能越差， 隔绝内部与外界接触，______。", "answer": "保温效果越好"}, {"id": 315, "unit": "第四单元 热", "lesson": "第 7 课 做个保温杯", "question": "使杯中热水凉得更慢的方法：（1）给杯子加一个______。（2）用热的不良导体将杯子包起来。", "answer": "密封的盖"}, {"id": 316, "unit": "第四单元 热", "lesson": "第 7 课 做个保温杯", "question": "使杯中热水凉得更慢的方法：（1）给杯子加一个密封的盖。（2）用热的______将杯子包起来。", "answer": "不良导体"}, {"id": 317, "unit": "第四单元 热", "lesson": "第 7 课 做个保温杯", "question": "保温瓶内胆原理：（1）木塞是热的不良导体，______。（2）内胆中 间为真空，无热传导与热对流。（3）内壁镀银，减少热辐射。", "answer": "隔绝内部物质与外界空气的接触，减少热传导与热对流"}, {"id": 318, "unit": "第四单元 热", "lesson": "第 7 课 做个保温杯", "question": "保温瓶内胆原理：（1）木塞是热的不良导体，隔绝内部物质与外界空气的接触，减少热传导与热对流。（2）内胆中 间为真空，______。（3）内壁镀银，减少热辐射。", "answer": "无热传导与热对流"}, {"id": 319, "unit": "第四单元 热", "lesson": "第 7 课 做个保温杯", "question": "保温瓶内胆原理：（1）木塞是热的不良导体，隔绝内部物质与外界空气的接触，减少热传导与热对流。（2）内胆中 间为真空，无热传导与热对流。（3）内壁镀银，______。", "answer": "减少热辐射"}];

  try {

      return {
        answers: s.answers || {},
